      ${side==='own'?'<div class="hint" style="margin-top:6px;">※この試合の出場・スタッツ記録も削除されます。選手登録自体は「選手管理」に残ります。</div>':''}
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#eCancel').onclick = ()=> overlay.remove();
  overlay.querySelector('#eSave').onclick = async ()=>{
    const number = overlay.querySelector('#eNum').value.trim();
    const name = overlay.querySelector('#eName').value.trim();
    if(!number){ showToast('背番号を入力してください'); return; }
    const pool = side==='own' ? state.roster : g.oppPlayers;
    if(pool.some(x=> x.id!==pid && String(x.number)===number)){ showToast('背番号 '+number+' はすでに使われています'); return; }
    if(side==='own' && !name){ showToast('選手名を入力してください'); return; }
    p.number = number;
    p.name = name;
    if(side==='own') await persistRoster();
    await persistGames();
    overlay.remove();
    onDone();
  };
  overlay.querySelector('#eDelete').onclick = async ()=>{
    const msg = side==='own'
      ? 'この選手をこの試合から外しますか？この試合でのスタッツ記録は削除されます。'
      : 'この相手選手を削除しますか？記録したスタッツも削除されます。';
    if(!(await askConfirm(msg))) return;
    if(side==='own'){
      g.playerIds = g.playerIds.filter(id=>id!==pid);
      delete g.stats[pid];
      if(state.selectedPlayerId===pid){ state.selectedPlayerId=null; state.selectedSide=null; }
    } else {
      g.oppPlayers = g.oppPlayers.filter(x=>x.id!==pid);
      delete g.oppPlayerStats[pid];
      if(state.selectedOppPlayerId===pid){ state.selectedOppPlayerId=null; state.selectedSide=null; }
    }
    await persistGames();
    overlay.remove();
    onDone();
  };
}

function statLabel(key){
  const map = {twoM:'2点成功',twoA:'2点失敗',threeM:'3点成功',threeA:'3点失敗',ftM:'フリースロー成功',ftA:'フリースロー失敗',
    oreb:'オフェンスリバウンド',dreb:'ディフェンスリバウンド',ast:'アシスト',stl:'スティール',blk:'ブロック',tov:'ターンオーバー',pf:'ファウル'};
  return map[key]||key;
}

/* ---------- シュートチャート タブ ---------- */
function renderShotChart(body, g){
  ensureOppPlayers(g);
  const side = state.chartSide || 'own';
  const players = g.playerIds.map(pid=> state.roster.find(p=>p.id===pid) || {id:pid,name:'不明',number:'?'});
  players.sort((a,b)=> (a.number+'').localeCompare(b.number+'',undefined,{numeric:true}));
  const oppSorted = g.oppPlayers.slice().sort((a,b)=>(a.number+'').localeCompare(b.number+'',undefined,{numeric:true}));

  // どの選手のチャートを表示するか（null=そのチーム全員）
  const filterId = side==='own' ? state.chartOwnId : state.chartOppId;

  // 表示するショットを抽出
  const allShots = (g.shotLog||[]).filter(sh=> side==='own' ? sh.team!=='opp' : sh.team==='opp');
  const shots = allShots.filter(sh=>{
    if(!filterId) return true;
    return side==='own' ? sh.playerId===filterId : sh.oppPlayerId===filterId;
  });

  // 集計
  const made = shots.filter(s=>s.made).length;
  const att = shots.length;
  const fgPct = att>0 ? Math.round(made/att*1000)/10 : 0;

  // 選手選択チップ
  const chipList = side==='own' ? players : oppSorted;
  const chipsHtml = chipList.map(p=>{
    const isSel = filterId===p.id;
    return `<button class="chart-chip ${isSel?'on':''}" data-chart-pid="${p.id}">#${escapeHtml(String(p.number))} ${escapeHtml(p.name||'')}</button>`;
  }).join('');

  body.innerHTML = `
    <div class="view-toggle" style="margin-bottom:10px;">
      <button id="csOwn" class="${side==='own'?'active':''}">自チーム</button>
      <button id="csOpp" class="${side==='opp'?'active':''}">相手（${escapeHtml(g.opponent)}）</button>
    </div>
    <div class="chart-chips">
      <button class="chart-chip ${!filterId?'on':''}" data-chart-pid="">全員</button>
      ${chipsHtml}
    </div>
    <div class="court-wrap" style="margin-top:12px;">${buildCourtSvg(shots, null)}</div>
    <div class="chart-legend">
      <span><span class="lg-made"></span> 成功（○）</span>
      <span><span class="lg-miss"></span> 失敗（×）</span>
    </div>
    <div class="card" style="padding:14px 16px; margin-top:12px;">
      <div style="display:flex; justify-content:space-around; text-align:center;">
        <div><div class="big-num">${att}</div><div class="hint">試投数</div></div>
        <div><div class="big-num" style="color:var(--green);">${made}</div><div class="hint">成功数</div></div>
        <div><div class="big-num" style="color:var(--orange);">${fgPct}%</div><div class="hint">成功率</div></div>
      </div>
    </div>
    <div class="hint" style="margin-top:8px;">シュートは「スタッツ入力」画面でコートをタップして記録します。ここでは記録された結果を確認できます。</div>
  `;

  document.getElementById('csOwn').onclick = ()=>{ state.chartSide='own'; render(); };
  document.getElementById('csOpp').onclick = ()=>{ state.chartSide='opp'; render(); };
  body.querySelectorAll('[data-chart-pid]').forEach(btn=>{
    btn.onclick = ()=>{
      const pid = btn.getAttribute('data-chart-pid') || null;
      if(side==='own') state.chartOwnId = pid; else state.chartOppId = pid;
      render();
    };
  });
}

/* ---------- プレイ修正タブ ---------- */
/* ログ1件の表示用情報（選手名・種類ラベル・チーム名） */
function describeEntry(g, e){
  if(e.timeout){
    return { name:'—', teamName: e.timeout==='own' ? (g.teamName||'自チーム') : g.opponent, label:'タイムアウト', key:'timeout', isOpp:e.timeout==='opp' };
  }
  const key = e.key || e.oppKey;
  const isOpp = !!e.oppPlayerId || (!!e.oppKey && !e.playerId);
  let name = '不明', teamName;
  if(isOpp){
    teamName = g.opponent;
    const p = (g.oppPlayers||[]).find(x=>x.id===e.oppPlayerId);
    if(p) name = (p.name||'') || ('#'+p.number);
    else if(!e.oppPlayerId) name = '(チーム記録)';
  } else {
    teamName = '自チーム';
    const p = state.roster.find(x=>x.id===e.playerId);
    if(p) name = p.name;
  }
  return { name, teamName, label: statLabel(key), key, isOpp };
}

function renderPlayLog(body, g){
  ensureOppPlayers(g);
  const log = g.log || [];

  // 先頭から順に走査してスコア推移を計算（各プレイ後のスコアを行に表示）
  const scoreOf = (e)=>{
    const key = e.key || e.oppKey;
    return key==='twoM'?2 : key==='threeM'?3 : key==='ftM'?1 : 0;
  };
  let own=0, opp=0;
  const rows = log.map((e, idx)=>{
    const isOpp = !!e.oppPlayerId || (!!e.oppKey && !e.playerId);
    const sc = scoreOf(e);
    if(sc){ if(isOpp) opp+=sc; else own+=sc; }
    return { e, idx, own, opp };
  });
  rows.reverse(); // 新しい順に表示

  let listHtml = rows.map(r=>{
    const d = describeEntry(g, r.e);
    const timeStr = (r.e.clockSec!=null) ? fmtClock(r.e.clockSec) : '--:--';
    const qStr = r.e.quarter ? (r.e.quarter<=4? r.e.quarter+'Q' : 'OT'+(r.e.quarter-4)) : '';
    return `<div class="log-row" data-log-idx="${r.idx}">
      <span class="lg-time">${qStr} ${timeStr}</span>
      <span class="lg-name">${escapeHtml(d.name)} <small>(${escapeHtml(d.teamName)})</small></span>
      <span class="lg-label">${escapeHtml(d.label)}</span>
      <span class="lg-score">${r.own} - ${r.opp}</span>
    </div>`;
  }).join('');

  if(rows.length===0){
    listHtml = '<div class="empty" style="padding:24px;">まだプレイが記録されていません</div>';
  }

  body.innerHTML = `
    <div class="hint" style="margin-bottom:10px;">行をタップすると、そのプレイの修正・削除ができます（新しい順）</div>
    <div class="card" style="padding:6px 4px;">${listHtml}</div>
  `;

  body.querySelectorAll('[data-log-idx]').forEach(row=>{
    row.onclick = ()=>{
      const idx = parseInt(row.getAttribute('data-log-idx'),10);
      openPlayEditDialog(g, idx);
    };
  });
}

/* プレイの修正・削除ダイアログ */
function openPlayEditDialog(g, idx){
  const e = g.log[idx];
  if(!e) return;
  const key = e.key || e.oppKey;
  const isOpp = !!e.oppPlayerId || (!!e.oppKey && !e.playerId);
  if(e.oppKey && !e.oppPlayerId){
    showToast('旧形式の記録のため、この行は編集できません（削除は可能）');
  }

  const players = g.playerIds.map(pid=> state.roster.find(p=>p.id===pid) || {id:pid,name:'不明',number:'?'});
  const oppSorted = (g.oppPlayers||[]).slice().sort((a,b)=>(a.number+'').localeCompare(b.number+'',undefined,{numeric:true}));

  const typeOptions = [
    ['twoM','2ポイント成功'],['twoA','2ポイント失敗'],['threeM','3ポイント成功'],['threeA','3ポイント失敗'],
    ['ftM','フリースロー成功'],['ftA','フリースロー失敗'],['oreb','オフェンスリバウンド'],['dreb','ディフェンスリバウンド'],
    ['ast','アシスト'],['stl','スティール'],['blk','ブロック'],['tov','ターンオーバー'],['pf','ファウル']
  ];

  const curPid = isOpp ? ('opp:'+(e.oppPlayerId||'')) : ('own:'+(e.playerId||''));
  const curMin = e.clockSec!=null ? Math.floor(e.clockSec/60) : 0;
  const curSec = e.clockSec!=null ? e.clockSec%60 : 0;

  const playerOptions =
    '<optgroup label="自チーム">' + players.map(p=>`<option value="own:${p.id}" ${curPid==='own:'+p.id?'selected':''}>#${escapeHtml(String(p.number))} ${escapeHtml(p.name)}</option>`).join('') + '</optgroup>' +
    '<optgroup label="相手（'+escapeHtml(g.opponent)+'）">' + oppSorted.map(p=>`<option value="opp:${p.id}" ${curPid==='opp:'+p.id?'selected':''}>#${escapeHtml(String(p.number))} ${escapeHtml(p.name||'')}</option>`).join('') + '</optgroup>';

  const qOptions = [1,2,3,4,5,6].map(q=>`<option value="${q}" ${ (e.quarter||1)===q?'selected':''}>${q<=4? q+'Q':'OT'+(q-4)}</option>`).join('');
  const typeSelect = typeOptions.map(([k,l])=>`<option value="${k}" ${key===k?'selected':''}>${l}</option>`).join('');

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;';
  overlay.innerHTML = `
    <div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:380px;width:100%;max-height:85vh;overflow:auto;">
      <h2 style="margin:0 0 14px; font-size:15px; font-weight:700;">プレイの修正</h2>
      <div class="edit-field"><label>クォーター</label><select id="peQ">${qOptions}</select></div>
      <div class="edit-field"><label>残り時間</label>
        <span style="display:flex; align-items:center; gap:6px;">
          <input type="number" id="peMin" value="${curMin}" min="0" max="99" style="width:70px; text-align:center;">
          <b>:</b>
          <input type="number" id="peSec" value="${curSec}" min="0" max="59" style="width:70px; text-align:center;">
        </span>
      </div>
      <div class="edit-field"><label>プレイヤー</label><select id="pePlayer">${playerOptions}</select></div>
      <div class="edit-field"><label>種類</label><select id="peType">${typeSelect}</select></div>
      <div class="edit-field" id="peFtRow" style="display:${key==='pf'?'flex':'none'};"><label>FT本数</label>
        <select id="peFt">
          ${[0,1,2,3].map(n=>`<option value="${n}" ${(e.ftAwarded||0)===n?'selected':''}>${n}本</option>`).join('')}
        </select>
      </div>
      <div style="display:flex; gap:8px; margin-top:16px;">
        <button class="btn btn-ghost" id="peCancel" style="flex:1;">閉じる</button>
        <button class="btn btn-primary" id="peSave" style="flex:1;">完了</button>
      </div>
      <button class="btn btn-danger btn-block" id="peDelete" style="margin-top:8px;">このプレイを削除</button>
    </div>`;
  document.body.appendChild(overlay);

  // 種類を「ファウル」にしたときだけFT本数欄を表示
  overlay.querySelector('#peType').onchange = ()=>{
    overlay.querySelector('#peFtRow').style.display = overlay.querySelector('#peType').value==='pf' ? 'flex' : 'none';
  };

  overlay.querySelector('#peCancel').onclick = ()=> overlay.remove();

  overlay.querySelector('#peDelete').onclick = async ()=>{
    if(!(await askConfirm('このプレイを削除しますか？スタッツから取り消されます。'))) return;
    applyLogEntry(g, e, -1);
    if(e.shotId){ g.shotLog = (g.shotLog||[]).filter(sh=>sh.id!==e.shotId); }
    g.log.splice(idx, 1);
    await persistGames();
    overlay.remove();
    showToast('削除しました');
    render();
  };

  overlay.querySelector('#peSave').onclick = async ()=>{
    // 旧形式（選手idなしの相手チーム記録）とタイムアウトは編集不可
    if(e.timeout){ showToast('タイムアウトは編集できません（削除のみ可能です）'); return; }
    if(e.oppKey && !e.oppPlayerId){ showToast('この記録は編集できません'); return; }
    const newQ = parseInt(overlay.querySelector('#peQ').value,10) || 1;
    let m = parseInt(overlay.querySelector('#peMin').value,10); if(isNaN(m)||m<0) m=0;
    let sSec = parseInt(overlay.querySelector('#peSec').value,10); if(isNaN(sSec)||sSec<0) sSec=0; if(sSec>59) sSec=59;
    const newClockSec = m*60 + sSec;
    const pv = overlay.querySelector('#pePlayer').value; // "own:id" / "opp:id"
    const newKey = overlay.querySelector('#peType').value;
    const [side, pid] = pv.split(':');
    if(!pid){ showToast('プレイヤーを選択してください'); return; }

    // 位置つきシュートの情報を退避（種類がシュートのままなら位置を引き継ぐ）
    const oldShot = e.shotId ? (g.shotLog||[]).find(sh=>sh.id===e.shotId) : null;
    const isShotKey = ['twoM','twoA','threeM','threeA'].includes(newKey);

    // 旧エントリを打ち消し
    applyLogEntry(g, e, -1);
    if(e.shotId){ g.shotLog = (g.shotLog||[]).filter(sh=>sh.id!==e.shotId); }

    // 新エントリを作成して適用
    const fields = side==='own' ? {playerId:pid, key:newKey} : {oppPlayerId:pid, oppKey:newKey};
    const ne = { id:e.id||uid(), quarter:newQ, clockSec:newClockSec, ts:e.ts||Date.now() };
    Object.assign(ne, fields);
    if(newKey==='pf'){ ne.ftAwarded = parseInt(overlay.querySelector('#peFt').value,10)||0; }
    // 位置情報の引き継ぎ（シュート→シュートの変更のみ）
    if(isShotKey && oldShot){
      const shotId = uid();
      const made = (newKey==='twoM'||newKey==='threeM');
      const isThree = (newKey==='threeM'||newKey==='threeA');
      const shot = {id:shotId, x:oldShot.x, y:oldShot.y, isThree, made, quarter:newQ, ts:ne.ts};
      if(side==='opp'){ shot.oppPlayerId=pid; shot.team='opp'; } else { shot.playerId=pid; }
      g.shotLog.push(shot);
      ne.shotId = shotId;
    }
    applyLogEntry(g, ne, +1);
    g.log[idx] = ne;

    await persistGames();
    overlay.remove();
    showToast('修正しました');
    render();
  };
}

function renderBoxScore(body, g){
  ensureOppPlayers(g);
  const players = g.playerIds.map(pid=> state.roster.find(p=>p.id===pid) || {id:pid,name:'不明',number:'?'});
  let rows = '';
  let teamPts=0, teamReb=0, teamAst=0, teamStl=0, teamBlk=0, teamTov=0, teamPf=0;
  let team2M=0,team2A=0,team3M=0,team3A=0,teamFtM=0,teamFtA=0,teamOreb=0,teamDreb=0;
  players.forEach(p=>{
    const s = g.stats[p.id];
    const P = pts(s), REB = s.oreb+s.dreb;
    teamPts+=P; teamReb+=REB; teamAst+=s.ast; teamStl+=s.stl; teamBlk+=s.blk; teamTov+=(s.tov||0); teamPf+=(s.pf||0);
    team2M+=s.twoM; team2A+=s.twoA; team3M+=s.threeM; team3A+=s.threeA; teamFtM+=s.ftM; teamFtA+=s.ftA;
    teamOreb+=s.oreb; teamDreb+=s.dreb;
    const pm = s.plusMinus||0;
    rows += `<tr>
      <td>#${p.number} ${escapeHtml(p.name)}</td>
      <td class="pts-cell">${P}</td>
      <td>${fmtMin(liveSeconds(s))}</td>
      <td>${s.twoM}/${s.twoA}</td>
      <td>${s.threeM}/${s.threeA}</td>
      <td>${s.ftM}/${s.ftA}</td>
      <td>${pct(s.twoM+s.threeM, s.twoA+s.threeA)}%</td>
      <td>${s.oreb}</td>
      <td>${s.dreb}</td>
      <td>${REB}</td>
      <td>${s.ast}</td>
      <td>${s.stl}</td>
      <td>${s.blk}</td>
      <td>${s.tov||0}</td>
      <td style="color:${(s.pf||0)>=5?'var(--red)':'var(--text)'}">${s.pf||0}</td>
      <td style="color:${pm>0?'var(--green)':pm<0?'var(--red)':'var(--text-dim)'}">${pm>0?'+':''}${pm}</td>
      <td style="color:var(--amber); font-weight:700;">${effOf(s)}</td>
    </tr>`;
  });

  const os = sumOppStats(g);
  const oppReb = os.oreb + os.dreb;
  let oppRows = '';
  const oppSorted = g.oppPlayers.slice().sort((a,b)=>(a.number+'').localeCompare(b.number+'',undefined,{numeric:true}));
  oppSorted.forEach(p=>{
    const s = g.oppPlayerStats[p.id] || emptyTeamStats();
    const REB = s.oreb+s.dreb;
    const pm = s.plusMinus||0;
    oppRows += `<tr>
      <td>#${escapeHtml(String(p.number))} ${escapeHtml(p.name||'')}</td>
      <td class="pts-cell">${pts(s)}</td>
      <td>${fmtMin(s.secondsPlayed||0)}</td>
      <td>${s.twoM}/${s.twoA}</td>
      <td>${s.threeM}/${s.threeA}</td>
      <td>${s.ftM}/${s.ftA}</td>
      <td>${pct(s.twoM+s.threeM, s.twoA+s.threeA)}%</td>
      <td>${s.oreb}</td>
      <td>${s.dreb}</td>
      <td>${REB}</td>
      <td>${s.ast}</td>
      <td>${s.stl}</td>
      <td>${s.blk}</td>
      <td>${s.tov||0}</td>
      <td style="color:${(s.pf||0)>=5?'var(--red)':'var(--text)'}">${s.pf||0}</td>
      <td style="color:${pm>0?'var(--green)':pm<0?'var(--red)':'var(--text-dim)'}">${pm>0?'+':''}${pm}</td>
      <td style="color:var(--amber); font-weight:700;">${effOf(s)}</td>
    </tr>`;
  });
  if(oppSorted.length===0){
    oppRows = '<tr><td colspan="17" class="empty">相手選手のスタッツはまだ記録されていません</td></tr>';
  }

  // ポゼッション推定: FGA + 0.44*FTA + TOV - OREB
  const teamFga = team2A + team3A;
  const oppFga = os.twoA + os.threeA;
  const teamPoss = Math.round(teamFga + 0.44*teamFtA + teamTov - teamOreb);
  const oppPoss = Math.round(oppFga + 0.44*os.ftA + os.tov - os.oreb);

  body.innerHTML = `
    <div id="boxCapture">
    <div class="card" style="padding:14px 16px;">
      <h2>チームスタッツ</h2>
      <div class="boxscore-wrap">
        <table style="min-width:0;">
          <thead><tr><th>チーム</th><th>PTS</th><th>POSS</th><th>2P</th><th>3P</th><th>FT</th><th>OREB</th><th>DREB</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>TOV</th><th>PF</th></tr></thead>
          <tbody>
            <tr><td>自チーム</td><td class="pts-cell">${teamPts}</td><td>${teamPoss}</td><td>${team2M}/${team2A}</td><td>${team3M}/${team3A}</td><td>${teamFtM}/${teamFtA}</td><td>${teamOreb}</td><td>${teamDreb}</td><td>${teamReb}</td><td>${teamAst}</td><td>${teamStl}</td><td>${teamBlk}</td><td>${teamTov}</td><td>${teamPf}</td></tr>
            <tr><td>${escapeHtml(g.opponent)}</td><td class="pts-cell">${g.opponentScore||0}</td><td>${oppPoss}</td><td>${os.twoM}/${os.twoA}</td><td>${os.threeM}/${os.threeA}</td><td>${os.ftM}/${os.ftA}</td><td>${os.oreb}</td><td>${os.dreb}</td><td>${oppReb}</td><td>${os.ast}</td><td>${os.stl}</td><td>${os.blk}</td><td>${os.tov}</td><td>${os.pf}</td></tr>
          </tbody>
        </table>
      </div>
      <div class="hint" style="margin-top:8px;">POSS（ポゼッション）＝ FGA + 0.44×FTA + TOV − OREB による推定値</div>
    </div>

    <div class="card" style="padding:14px 16px;">
      <h2>自チーム個人スタッツ</h2>
      <div class="boxscore-wrap">
        <table>
          <thead><tr>
            <th>選手</th><th>PTS</th><th>MIN</th><th>2P</th><th>3P</th><th>FT</th><th>FG%</th>
            <th>OREB</th><th>DREB</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>TOV</th><th>PF</th><th>+/-</th><th>EFF</th>
          </tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr style="border-top:2px solid var(--line); font-weight:700;">
            <td>チーム合計</td><td class="pts-cell">${teamPts}</td><td>-</td><td>-</td><td>-</td><td>-</td><td>-</td>
            <td>-</td><td>-</td><td>${teamReb}</td><td>${teamAst}</td><td>${teamStl}</td><td>${teamBlk}</td><td>${teamTov}</td><td>${teamPf}</td><td>-</td><td>-</td>
          </tr></tfoot>
        </table>
      </div>
    </div>

    <div class="card" style="padding:14px 16px;">
      <h2>相手チーム個人スタッツ（${escapeHtml(g.opponent)}）</h2>
      <div class="boxscore-wrap">
        <table>
          <thead><tr>
            <th>選手</th><th>PTS</th><th>MIN</th><th>2P</th><th>3P</th><th>FT</th><th>FG%</th>
            <th>OREB</th><th>DREB</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>TOV</th><th>PF</th><th>+/-</th><th>EFF</th>
          </tr></thead>
          <tbody>${oppRows}</tbody>
        </table>
      </div>
    </div>

    <div class="hint">EFF ＝ (得点＋REB＋AST＋STL＋BLK) － (FG失敗＋FT失敗＋TOV)　／　+/- ＝ 出場中のチーム得点－相手得点</div>
    </div>
    <div class="util-row">
      <button class="btn btn-primary btn-block" id="imgBtn">📷 画像として保存</button>
      <button class="btn btn-primary btn-block" id="sheetBtn">📋 スコアシート出力</button>
    </div>
    <div class="util-row">
      <button class="btn btn-ghost btn-block" id="csvBtn">CSVでダウンロード</button>
    </div>
  `;
  document.getElementById('csvBtn').onclick = ()=> exportCsv(g, players);
  document.getElementById('imgBtn').onclick = ()=> exportBoxImage(g);
  document.getElementById('sheetBtn').onclick = ()=> exportScoresheet(g);
}

/* ---------- スコアシート出力（FIBA公式様式・完全オフライン） ----------
   参考様式: 左=チームA/Bブロック(タイムアウト・チームファウル・選手表・コーチ欄)
             右=ランニングスコア4列 + クォーター別スコア + 最終スコア + 勝者
   公式ルールに合わせ 1Q・3Q=赤 / 2Q・4Q・OT=黒 で記入。3Pは番号を○囲み、FTは番号横に黒点 */
function exportScoresheet(g){
  ensureOppPlayers(g);
  showToast('スコアシートを作成中...');

  // ===== データ収集 =====
  const players = g.playerIds.map(pid=> state.roster.find(p=>p.id===pid) || {id:pid,name:'不明',number:'?'});
  players.sort((a,b)=>(a.number+'').localeCompare(b.number+'',undefined,{numeric:true}));
  const oppSorted = (g.oppPlayers||[]).slice().sort((a,b)=>(a.number+'').localeCompare(b.number+'',undefined,{numeric:true}));
  const teamAName = g.teamName || '自チーム';
  const teamBName = g.opponent || '相手チーム';
  const finalA = g.playerIds.reduce((s,pid)=>s+pts(g.stats[pid]),0);
  const finalB = g.opponentScore||0;

  const qScores = {};  // {q:{a,b}}
  const runsA = {}, runsB = {}; // 累積得点 -> {num, q, isFt, isThree}
  const foulsBy = {};  // 'p:id'/'o:id' -> [{q, ft}]
  const toA = {first:0, second:0, ot:0}, toB = {first:0, second:0, ot:0};
  let cumA = 0, cumB = 0;
  (g.log||[]).forEach(e=>{
    const q = e.quarter || 1;
    if(e.timeout){
      const slot = q<=2 ? 'first' : (q<=4 ? 'second' : 'ot');
      (e.timeout==='own' ? toA : toB)[slot]++;
      return;
    }
    const key = e.key || e.oppKey;
    const isOpp = !!e.oppPlayerId || (!!e.oppKey && !e.playerId);
    if(key==='pf'){
      const pk = isOpp ? ('o:'+e.oppPlayerId) : ('p:'+e.playerId);
      (foulsBy[pk] = foulsBy[pk]||[]).push({q, ft:(typeof e.ftAwarded==='number')? e.ftAwarded : null});
      return;
    }
    const sc = key==='twoM'?2 : key==='threeM'?3 : key==='ftM'?1 : 0;
    if(!sc) return;
    qScores[q] = qScores[q] || {a:0,b:0};
    if(isOpp){
      const p = oppSorted.find(x=>x.id===e.oppPlayerId);
      cumB += sc; qScores[q].b += sc;
      runsB[cumB] = {num: p?String(p.number):'?', q, isFt:key==='ftM', isThree:key==='threeM'};
    } else {
      const p = players.find(x=>x.id===e.playerId);
      cumA += sc; qScores[q].a += sc;
      runsA[cumA] = {num: p?String(p.number):'?', q, isFt:key==='ftM', isThree:key==='threeM'};
    }
  });
  const played = (s)=> (s.secondsPlayed||0)>0 || pts(s)>0 || (s.twoA+s.threeA+s.ftA+s.oreb+s.dreb+s.ast+s.stl+s.blk+(s.tov||0)+(s.pf||0))>0;

  // ===== レイアウト =====
  const DPR = 2;
  const W = 1300, PAD = 34;
  const INK = '#1a1f27', GRAY = '#8a919c', LINE = '#3a4048', LIGHT = '#c9ced6', REDQ = '#c8281e', GBG = '#e9ebee';
  const qColor = (q)=> (q===1||q===3) ? REDQ : INK;

  const leftW = 660, gapCol = 26;
  const rightX = PAD + leftW + gapCol;
  const rightW = W - rightX - PAD;

  // 選手表: 公式同様に固定行数
  const P_ROWS = Math.max(12, Math.min(18, Math.max(players.length, oppSorted.length, 12)));
  const prowH = 24, headH2 = 22;

  // チームブロック高さ
  const tbH = 26 /*name*/ + 86 /*TO+TF*/ + headH2 + P_ROWS*prowH + 2*24 /*coach*/ + 14;
  // ランニングスコア
  const runRowH = 19.2, RUN_ROWS = 40;
  const runH = 24 + RUN_ROWS*runRowH;
  const headerH = 128;
  const rightBelowH = 30 + 6*26 + 16 + 40 + 30 + 26; // スコア表+最終+勝者
  const leftColH = tbH*2 + 14 + 3*30; // 署名欄
  const rightColH = 24 + runH + 16 + rightBelowH;
  const H = PAD + headerH + Math.max(leftColH, rightColH) + PAD;

  const canvas = document.createElement('canvas');
  canvas.width = W*DPR; canvas.height = H*DPR;
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR,DPR);
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,W,H);
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 1;

  const text = (t,x,y,font,color,align)=>{
    ctx.font = font; ctx.fillStyle = color||INK; ctx.textAlign = align||'left';
    ctx.fillText(t, x, y); ctx.textAlign='left';
  };
  const box = (x,y,w,h,stroke)=>{ ctx.strokeStyle = stroke||LINE; ctx.strokeRect(x,y,w,h); };
  const xMark = (x,y,w,h,color)=>{
    ctx.strokeStyle = color||INK; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(x+2,y+2); ctx.lineTo(x+w-2,y+h-2);
    ctx.moveTo(x+w-2,y+2); ctx.lineTo(x+2,y+h-2); ctx.stroke();
    ctx.lineWidth = 1;
  };
  const fillLine = (x1,y,x2,color)=>{ ctx.strokeStyle=color||LINE; ctx.beginPath(); ctx.moveTo(x1,y); ctx.lineTo(x2,y); ctx.stroke(); };

  // ===== ヘッダー =====
  let y = PAD;
  text('BASKETBALL SCORESHEET', PAD, y+12, '800 26px Inter, sans-serif', INK);
  // チームA/B表
  const tTblY = y+34, tTblW = 420, tRowH = 26;
  box(PAD, tTblY, tTblW, tRowH*2);
  fillLine(PAD, tTblY+tRowH, PAD+tTblW);
  fillLine(PAD+92, tTblY, PAD+92, null); // 縦線は下で
  ctx.strokeStyle = LINE; ctx.beginPath(); ctx.moveTo(PAD+92, tTblY); ctx.lineTo(PAD+92, tTblY+tRowH*2); ctx.stroke();
  text('チームA :', PAD+8, tTblY+tRowH/2, 'bold 13px Inter, sans-serif');
  text('チームB :', PAD+8, tTblY+tRowH*1.5, 'bold 13px Inter, sans-serif');
  text(teamAName, PAD+102, tTblY+tRowH/2, '13px Inter, sans-serif');
  text(teamBName, PAD+102, tTblY+tRowH*1.5, '13px Inter, sans-serif');

  // 右側: 大会情報
  const infoX = PAD+470, infoW = W-PAD-infoX;
  const infoRow = (label1,val1,label2,val2,yy)=>{
    text(label1, infoX, yy, 'bold 12px Inter, sans-serif');
    const l1w = ctx.measureText(label1).width;
    text(val1||'', infoX+l1w+8, yy, '12px Inter, sans-serif');
    fillLine(infoX+l1w+6, yy+10, infoX+infoW/2-12, LIGHT);
    if(label2!=null){
      const x2 = infoX+infoW/2;
      text(label2, x2, yy, 'bold 12px Inter, sans-serif');
      const l2w = ctx.measureText(label2).width;
      text(val2||'', x2+l2w+8, yy, '12px Inter, sans-serif');
      fillLine(x2+l2w+6, yy+10, infoX+infoW, LIGHT);
    }
  };
  infoRow('大会名 :', g.title||'', '会場 :', '', y+10);
  infoRow('Game No. :', '', '日付 :', g.date||'', y+38);
  infoRow('クルーチーフ :', '', '試合開始時間 :', '', y+66);
  infoRow('1st アンパイア :', '', '2nd アンパイア :', '', y+94);

  y = PAD + headerH;

  // ===== チームブロック =====
  function drawTeamBlock(x0, y0, label, name, list, statsOf, foulPrefix, teamFouls, to, grayHead){
    let yy = y0;
    box(x0, yy, leftW, tbH);
    // チーム名行
    if(grayHead){ ctx.fillStyle = GBG; ctx.fillRect(x0+1, yy+1, leftW-2, 24); }
    text(`${label} :  ${name}`, x0+10, yy+13, 'bold 13px Inter, sans-serif');
    yy += 26;
    // タイムアウト(左) / チームファウル(右)
    text('タイムアウト', x0+10, yy+10, 'bold 11px Inter, sans-serif', GRAY);
    text('チームファウル', x0+250, yy+10, 'bold 11px Inter, sans-serif', GRAY);
    const toRow = (lab, n, boxes, ty)=>{
      let bx = x0+10;
      for(let i=1;i<=boxes;i++){
        box(bx, ty, 16, 16);
        if(n>=i) xMark(bx, ty, 16, 16, INK);        // 使用済み: ×
        else fillLine(bx+2, ty+8, bx+14, INK);       // 未使用: 横線で抹消
        bx += 18;
      }
      text(lab, bx+6, ty+8, '11px Inter, sans-serif');
    };
    toRow('前半', Math.min(to.first,2), 2, yy+22);
    toRow('後半', Math.min(to.second,3), 3, yy+42);
    toRow('オーバータイム(OT)', Math.min(to.ot,1), 1, yy+62);
    // チームファウル 1Q-4Q (2列×2行)
    const tfCell = (q, tx, ty)=>{
      text(q+'Q', tx, ty+8, 'bold 11px Inter, sans-serif');
      const n = teamFouls[q]||0;
      for(let i=1;i<=4;i++){
        const bx = tx+26+(i-1)*20;
        box(bx, ty, 18, 16);
        text(String(i), bx+9, ty+8, '9px Inter, sans-serif', LIGHT, 'center');
        if(n>=i) xMark(bx, ty, 18, 16, qColor(q));
      }
    };
    tfCell(1, x0+250, yy+22); tfCell(2, x0+430, yy+22);
    tfCell(3, x0+250, yy+52); tfCell(4, x0+430, yy+52);
    yy += 86;
    // 選手表ヘッダー
    const cols = [
      {label:'No.', w:34}, {label:'選手名', w:250}, {label:'#', w:44}, {label:'Player In', w:62},
    ];
    const foulColW = (leftW - cols.reduce((a,c)=>a+c.w,0)) / 5;
    ctx.fillStyle = GBG; ctx.fillRect(x0+1, yy, leftW-2, headH2);
    box(x0, yy, leftW, headH2);
    let cx = x0;
    cols.forEach(c=>{ text(c.label, cx+c.w/2, yy+headH2/2, 'bold 10.5px Inter, sans-serif', GRAY, 'center'); cx += c.w; });
    text('ファウル', cx + foulColW*2.5, yy+headH2/2, 'bold 10.5px Inter, sans-serif', GRAY, 'center');
    for(let f=1;f<=5;f++){} // (見出しは「ファウル」のみ・各列番号は行内)
    yy += headH2;
    // 選手行
    for(let i=0;i<P_ROWS;i++){
      const p = list[i];
      box(x0, yy, leftW, prowH);
      let xx = x0;
      // 縦罫線
      cols.forEach(c=>{ xx += c.w; ctx.strokeStyle=LIGHT; ctx.beginPath(); ctx.moveTo(xx,yy); ctx.lineTo(xx,yy+prowH); ctx.stroke(); });
      for(let f=1;f<5;f++){ const fx = xx+f*foulColW; ctx.strokeStyle=LIGHT; ctx.beginPath(); ctx.moveTo(fx,yy); ctx.lineTo(fx,yy+prowH); ctx.stroke(); }
      text(String(i+1), x0+17, yy+prowH/2, '10.5px "JetBrains Mono", monospace', GRAY, 'center');
      const foulStartX = x0+cols.reduce((a,c)=>a+c.w,0);
      if(p){
        const s = statsOf(p);
        text((p.name||'').slice(0,14), x0+cols[0].w+8, yy+prowH/2, '12px Inter, sans-serif');
        text(String(p.number), x0+cols[0].w+cols[1].w+cols[2].w/2, yy+prowH/2, '700 13px "JetBrains Mono", monospace', INK, 'center');
        if(played(s)) text('x', x0+cols[0].w+cols[1].w+cols[2].w+cols[3].w/2, yy+prowH/2, '12px Inter, sans-serif', REDQ, 'center');
        const fouls = foulsBy[foulPrefix+p.id] || [];
        for(let f=0; f<5; f++){
          const fx = foulStartX + f*foulColW;
          if(f < fouls.length){
            const fo = fouls[f];
            const col = qColor(fo.q);
            const label = 'P'+(fo.ft!=null && fo.ft>0 ? fo.ft : '');
            text(label, fx+foulColW/2, yy+prowH/2, 'bold 11px Inter, sans-serif', col, 'center');
          } else {
            // 未使用のファウルマスは斜線で抹消
            ctx.strokeStyle = LIGHT;
            ctx.beginPath(); ctx.moveTo(fx+3, yy+prowH-3); ctx.lineTo(fx+foulColW-3, yy+3); ctx.stroke();
          }
        }
      } else {
        // 登録のない空行は行全体（選手名〜ファウル）に斜線
        ctx.strokeStyle = LIGHT;
        ctx.beginPath(); ctx.moveTo(x0+cols[0].w+3, yy+prowH-3); ctx.lineTo(x0+leftW-3, yy+3); ctx.stroke();
      }
      yy += prowH;
    }
    // コーチ欄
    box(x0, yy, leftW, 24);
    text('ヘッドコーチ', x0+8, yy+12, 'bold 11px Inter, sans-serif', GRAY);
    yy += 24;
    box(x0, yy, leftW, 24);
    text('アシスタントコーチ', x0+8, yy+12, 'bold 11px Inter, sans-serif', GRAY);
    yy += 24;
    return yy;
  }

  drawTeamBlock(PAD, y, 'チームA', teamAName, players, p=>g.stats[p.id], 'p:', g.teamFoulsByQuarter||{}, toA, false);
  drawTeamBlock(PAD, y+tbH+14, 'チームB', teamBName, oppSorted, p=>(g.oppPlayerStats[p.id]||emptyTeamStats()), 'o:', g.oppFoulsByQuarter||{}, toB, true);

  // 署名欄(左下)
  let sy = y + tbH*2 + 14 + 18;
  const signRow = (l1, l2, yy)=>{
    text(l1, PAD, yy, 'bold 12px Inter, sans-serif');
    fillLine(PAD+100, yy+10, PAD+310, LIGHT);
    text(l2, PAD+340, yy, 'bold 12px Inter, sans-serif');
    fillLine(PAD+460, yy+10, PAD+leftW, LIGHT);
  };
  signRow('スコアラー :', 'A.スコアラー :', sy);
  signRow('タイマー :', 'S.C.オペレーター :', sy+30);

  // ===== ランニングスコア(右列) =====
  let ry = y;
  text('ランニングスコア', rightX, ry+8, 'bold 14px Inter, sans-serif');
  ry += 24;
  const nBlocks = 4;
  const blockGap = 10;
  const blockW = (rightW - blockGap*(nBlocks-1)) / nBlocks;
  const scorerW = blockW*0.24, scoreW = blockW*0.26;
  ctx.lineWidth = 1;
  for(let b=0;b<nBlocks;b++){
    const bx = rightX + b*(blockW+blockGap);
    // ヘッダー A | B
    ctx.fillStyle = GBG; ctx.fillRect(bx, ry, blockW, 18);
    box(bx, ry, blockW, 18);
    text('A', bx+scorerW+scoreW/2, ry+9, 'bold 11px Inter, sans-serif', INK, 'center');
    text('B', bx+scorerW+scoreW*1.5, ry+9, 'bold 11px Inter, sans-serif', INK, 'center');
    for(let r=0;r<RUN_ROWS;r++){
      const score = b*RUN_ROWS + r + 1;
      const cy = ry + 18 + r*runRowH;
      // 4セル: [A番号][A得点][B得点][B番号]
      const cells = [
        {x:bx, w:scorerW}, {x:bx+scorerW, w:scoreW}, {x:bx+scorerW+scoreW, w:scoreW}, {x:bx+scorerW+scoreW*2, w:scorerW}
      ];
      cells.forEach(c=> box(c.x, cy, c.w, runRowH, LIGHT));
      // 得点数字(両列)
      text(String(score), cells[1].x+cells[1].w/2, cy+runRowH/2, '10px "JetBrains Mono", monospace', '#b8bec7', 'center');
      text(String(score), cells[2].x+cells[2].w/2, cy+runRowH/2, '10px "JetBrains Mono", monospace', '#b8bec7', 'center');
      const drawSide = (run, scorerCell, scoreCell)=>{
        if(!run) return;
        const col = qColor(run.q);
        // 得点セルに斜線
        ctx.strokeStyle = col; ctx.lineWidth = 1.3;
        ctx.beginPath();
        ctx.moveTo(scoreCell.x+2, cy+runRowH-2);
        ctx.lineTo(scoreCell.x+scoreCell.w-2, cy+2);
        ctx.stroke();
        ctx.lineWidth = 1;
        // 得点者番号（3Pは○囲み、FTは番号左に黒点）
        const nx = scorerCell.x+scorerCell.w/2;
        text(run.num, nx, cy+runRowH/2, 'bold 10.5px "JetBrains Mono", monospace', col, 'center');
        if(run.isThree){
          ctx.strokeStyle = col;
          ctx.beginPath(); ctx.arc(nx, cy+runRowH/2, 8, 0, Math.PI*2); ctx.stroke();
        }
        if(run.isFt){
          ctx.fillStyle = col;
          ctx.beginPath(); ctx.arc(scorerCell.x+4, cy+runRowH/2, 1.8, 0, Math.PI*2); ctx.fill();
        }
      };
      drawSide(runsA[score], cells[0], cells[1]);
      drawSide(runsB[score], cells[3], cells[2]);
    }
    box(bx, ry, blockW, 18+RUN_ROWS*runRowH);
  }
  ry += 18 + RUN_ROWS*runRowH + 16;

  // ===== クォーター別スコア・最終スコア・勝者 =====
  text('スコア', rightX, ry+12, 'bold 14px Inter, sans-serif');
  const stX = rightX+90, stW = rightW-90;
  // ヘッダー A / B
  ctx.fillStyle = GBG; ctx.fillRect(stX+50, ry, (stW-50)/2-20, 22);
  ctx.fillStyle = GBG; ctx.fillRect(stX+50+(stW-50)/2+20, ry, (stW-50)/2-20, 22);
  box(stX+50, ry, (stW-50)/2-20, 22); box(stX+50+(stW-50)/2+20, ry, (stW-50)/2-20, 22);
  text('A', stX+50+((stW-50)/2-20)/2, ry+11, 'bold 12px Inter, sans-serif', INK, 'center');
  text('B', stX+50+(stW-50)/2+20+((stW-50)/2-20)/2, ry+11, 'bold 12px Inter, sans-serif', INK, 'center');
  ry += 26;
  const qRows = [[1,'1Q'],[2,'2Q'],[3,'3Q'],[4,'4Q']];
  const otA = Object.keys(qScores).filter(q=>q>4).reduce((s,q)=>s+qScores[q].a,0);
  const otB = Object.keys(qScores).filter(q=>q>4).reduce((s,q)=>s+qScores[q].b,0);
  const scoreLine = (label, a, b, colA, colB, yy)=>{
    text(label, stX, yy+10, 'bold 12px Inter, sans-serif', GRAY);
    const half = (stW-50)/2;
    text(String(a), stX+50+(half-20)/2, yy+10, '700 14px "JetBrains Mono", monospace', colA, 'center');
    fillLine(stX+50, yy+22, stX+50+half-20, LIGHT);
    text('—', stX+50+half, yy+10, '12px Inter, sans-serif', GRAY, 'center');
    text(String(b), stX+50+half+20+(half-20)/2, yy+10, '700 14px "JetBrains Mono", monospace', colB, 'center');
    fillLine(stX+50+half+20, yy+22, stX+50+stW-50, LIGHT);
  };
  qRows.forEach(([q,label],i)=>{
    const s = qScores[q]||{a:0,b:0};
    scoreLine(label, s.a, s.b, qColor(q), qColor(q), ry+i*26);
  });
  scoreLine('OT', otA, otB, INK, INK, ry+4*26);
  ry += 5*26 + 14;

  // 最終スコア
  text('最終スコア', rightX, ry+16, 'bold 14px Inter, sans-serif');
  const fw = (rightW-90-40)/2;
  box(stX, ry, fw, 32); box(stX+fw+40, ry, fw, 32);
  text('A', stX+10, ry+16, 'bold 11px Inter, sans-serif', GRAY);
  text('B', stX+fw+40+fw-14, ry+16, 'bold 11px Inter, sans-serif', GRAY);
  text(String(finalA), stX+fw/2, ry+16, '800 18px "JetBrains Mono", monospace', INK, 'center');
  text(String(finalB), stX+fw+40+fw/2, ry+16, '800 18px "JetBrains Mono", monospace', INK, 'center');
  text('—', stX+fw+20, ry+16, '14px Inter, sans-serif', GRAY, 'center');
  ry += 44;
  text('勝者チーム', rightX, ry+10, 'bold 14px Inter, sans-serif');
  const winner = finalA>finalB ? teamAName : (finalB>finalA ? teamBName : '引き分け');
  text(winner, stX, ry+10, '700 14px Inter, sans-serif');
  fillLine(stX, ry+22, stX+stW-50, LIGHT);

  // ===== 保存 =====
  canvas.toBlob((blob)=>{
    if(!blob){ showToast('スコアシートの生成に失敗しました'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `scoresheet_${(g.title||('vs_'+teamBName)).replace(/\s+/g,'_')}_${g.date||''}.png`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('スコアシートを保存しました');
  }, 'image/png');
}

function exportCsv(g, players){
  ensureOppPlayers(g);
  const header = ['選手','背番号','PTS','MIN','2PM','2PA','3PM','3PA','FTM','FTA','OREB','DREB','REB','AST','STL','BLK','TOV','PF','+/-','EFF'];
  const lines = [header.join(',')];
  players.forEach(p=>{
    const s = g.stats[p.id];
    lines.push([p.name, p.number, pts(s), fmtMin(liveSeconds(s)), s.twoM,s.twoA,s.threeM,s.threeA,s.ftM,s.ftA,
      s.oreb,s.dreb,s.oreb+s.dreb,s.ast,s.stl,s.blk,s.tov||0,s.pf||0,s.plusMinus||0,effOf(s)].join(','));
  });
  lines.push('');
  lines.push(['相手チーム: '+g.opponent]);
  const oppHeader = ['選手(相手)','背番号','PTS','MIN','2PM','2PA','3PM','3PA','FTM','FTA','OREB','DREB','REB','AST','STL','BLK','TOV','PF','+/-','EFF'];
  lines.push(oppHeader.join(','));
  g.oppPlayers.forEach(p=>{
    const s = g.oppPlayerStats[p.id] || emptyTeamStats();
    lines.push([p.name||'', p.number, pts(s), fmtMin(s.secondsPlayed||0), s.twoM,s.twoA,s.threeM,s.threeA,s.ftM,s.ftA,
      s.oreb,s.dreb,s.oreb+s.dreb,s.ast,s.stl,s.blk,s.tov||0,s.pf||0,s.plusMinus||0,effOf(s)].join(','));
  });
  const blob = new Blob(["\uFEFF"+lines.join('\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `stats_vs_${g.opponent}_${g.date||''}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ボックススコアを全カラムが見える画像(PNG)として保存 */
/* ボックススコアを Canvas に直接描画して画像(PNG)保存（外部ライブラリ不要・完全オフライン対応） */
async function exportBoxImage(g){
  ensureOppPlayers(g);
  showToast('画像を作成中...');

  // ----- データ準備 -----
  const players = g.playerIds.map(pid=> state.roster.find(p=>p.id===pid) || {id:pid,name:'不明',number:'?'});
  const oppSorted = g.oppPlayers.slice().sort((a,b)=>(a.number+'').localeCompare(b.number+'',undefined,{numeric:true}));

  const playerHeader = ['選手','PTS','MIN','2P','3P','FT','FG%','OREB','DREB','REB','AST','STL','BLK','TOV','PF','+/-','EFF'];
  function ownRow(p){
    const s = g.stats[p.id];
    const pm = s.plusMinus||0;
    return ['#'+p.number+' '+(p.name||''), pts(s), fmtMin(liveSeconds(s)), s.twoM+'/'+s.twoA, s.threeM+'/'+s.threeA,
      s.ftM+'/'+s.ftA, pct(s.twoM+s.threeM,s.twoA+s.threeA)+'%', s.oreb, s.dreb, s.oreb+s.dreb, s.ast, s.stl, s.blk,
      s.tov||0, s.pf||0, (pm>0?'+':'')+pm, effOf(s)];
  }
  function oppRow(p){
    const s = g.oppPlayerStats[p.id] || emptyTeamStats();
    const pm = s.plusMinus||0;
    return ['#'+p.number+' '+(p.name||''), pts(s), fmtMin(s.secondsPlayed||0), s.twoM+'/'+s.twoA, s.threeM+'/'+s.threeA,
      s.ftM+'/'+s.ftA, pct(s.twoM+s.threeM,s.twoA+s.threeA)+'%', s.oreb, s.dreb, s.oreb+s.dreb, s.ast, s.stl, s.blk,
      s.tov||0, s.pf||0, (pm>0?'+':'')+pm, effOf(s)];
  }

  const teamScore = g.playerIds.reduce((sum,pid)=> sum + pts(g.stats[pid]), 0);
  const os = sumOppStats(g);
  const teamTov = players.reduce((a,p)=>a+(g.stats[p.id].tov||0),0);
  const teamOreb = players.reduce((a,p)=>a+g.stats[p.id].oreb,0);
  const team2A = players.reduce((a,p)=>a+g.stats[p.id].twoA,0);
  const team3A = players.reduce((a,p)=>a+g.stats[p.id].threeA,0);
  const teamFtA = players.reduce((a,p)=>a+g.stats[p.id].ftA,0);
  const teamPoss = Math.round(team2A+team3A + 0.44*teamFtA + teamTov - teamOreb);
  const oppPoss = Math.round(os.twoA+os.threeA + 0.44*os.ftA + os.tov - os.oreb);
  const sumTeam = (fn)=> players.reduce((a,p)=>a+fn(g.stats[p.id]),0);

  const teamHeader = ['チーム','PTS','POSS','2P','3P','FT','OREB','DREB','REB','AST','STL','BLK','TOV','PF'];
  const teamRows = [
    ['自チーム', teamScore, teamPoss, sumTeam(s=>s.twoM)+'/'+sumTeam(s=>s.twoA), sumTeam(s=>s.threeM)+'/'+sumTeam(s=>s.threeA),
      sumTeam(s=>s.ftM)+'/'+sumTeam(s=>s.ftA), teamOreb, sumTeam(s=>s.dreb), sumTeam(s=>s.oreb+s.dreb),
      sumTeam(s=>s.ast), sumTeam(s=>s.stl), sumTeam(s=>s.blk), teamTov, sumTeam(s=>s.pf||0)],
    [g.opponent, g.opponentScore||0, oppPoss, os.twoM+'/'+os.twoA, os.threeM+'/'+os.threeA, os.ftM+'/'+os.ftA,
      os.oreb, os.dreb, os.oreb+os.dreb, os.ast, os.stl, os.blk, os.tov, os.pf]
  ];

  // ----- 描画設定（高解像度） -----
  const DPR = 2;
  const rowH = 30;
  const headH = 32;
  const titleH = 46;
  const sectionH = 34;
  const pad = 24;
  const gap = 22;

  // 列幅を内容に応じて決める関数
  const cctx = document.createElement('canvas').getContext('2d');
  function colWidths(header, rows, firstColMin){
    const widths = header.map((h,i)=>{
      cctx.font = 'bold 14px Inter, sans-serif';
      let w = cctx.measureText(h).width;
      rows.forEach(r=>{
        cctx.font = '13px Inter, sans-serif';
        w = Math.max(w, cctx.measureText(String(r[i])).width);
      });
      return Math.ceil(w) + (i===0 ? 24 : 20);
    });
    if(firstColMin) widths[0] = Math.max(widths[0], firstColMin);
    return widths;
  }

  const teamW = colWidths(teamHeader, teamRows, 90);
  const ownRows = players.map(ownRow);
  const oppRowsArr = oppSorted.map(oppRow);
  const playerW = colWidths(playerHeader, ownRows.concat(oppRowsArr.length?oppRowsArr:[playerHeader.map(()=> '')]), 140);

  function tableWidth(w){ return w.reduce((a,b)=>a+b,0); }
  function tableHeight(rows){ return sectionH + headH + rows.length*rowH; }

  const blockW = Math.max(tableWidth(teamW), tableWidth(playerW));
  const totalW = blockW + pad*2;
  const oppBodyRows = oppRowsArr.length ? oppRowsArr : [['（記録なし）']];
  const totalH = pad + titleH + gap
    + tableHeight(teamRows) + gap
    + tableHeight(ownRows) + gap
    + tableHeight(oppBodyRows) + pad;

  const canvas = document.createElement('canvas');
  canvas.width = totalW * DPR;
  canvas.height = totalH * DPR;
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  // 色
  const C = { bg:'#ffffff', text:'#1a1f27', dim:'#6b7280', line:'#d9dde4', head:'#eef0f4',
    orange:'#ff6a1a', amber:'#c07a00', green:'#1f9d6b', red:'#e03149', pts:'#c07a00' };

  ctx.fillStyle = C.bg;
  ctx.fillRect(0,0,totalW,totalH);

  // タイトル
  let y = pad;
  ctx.fillStyle = C.text;
  ctx.font = '700 22px Oswald, Inter, sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillText(`自チーム ${teamScore} - ${g.opponentScore||0} ${g.opponent}`, pad, y);
  ctx.fillStyle = C.dim;
  ctx.font = '13px Inter, sans-serif';
  ctx.fillText(`${g.date||''}`, pad, y+26);
  y += titleH + gap;

  // テーブル描画関数
  function drawTable(sectionTitle, header, rows, widths, opts){
    opts = opts || {};
    const tW = tableWidth(widths);
    // セクションタイトル
    ctx.fillStyle = C.text;
    ctx.font = '700 15px Inter, sans-serif';
    ctx.fillText(sectionTitle, pad, y);
    y += sectionH;

    const x0 = pad;
    // ヘッダー背景
    ctx.fillStyle = C.head;
    ctx.fillRect(x0, y, tW, headH);
    // ヘッダー文字
    ctx.fillStyle = C.dim;
    ctx.font = 'bold 13px Inter, sans-serif';
    let cx = x0;
    header.forEach((h,i)=>{
      const align = i===0 ? 'left' : 'center';
      ctx.textAlign = align;
      const tx = i===0 ? cx+12 : cx+widths[i]/2;
      ctx.fillText(h, tx, y+9);
      cx += widths[i];
    });
    y += headH;

    // 行
    rows.forEach((r,ri)=>{
      const rowY = y + ri*rowH;
      // 罫線
      ctx.strokeStyle = C.line;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x0, rowY); ctx.lineTo(x0+tW, rowY); ctx.stroke();
      cx = x0;
      r.forEach((cell,ci)=>{
        const align = ci===0 ? 'left' : 'center';
        ctx.textAlign = align;
        // セル色分け
        let color = C.text;
        if(ci===1) color = C.pts; // PTS
        if(opts.effCol!=null && ci===opts.effCol) color = C.amber; // EFF
        if(opts.pmCol!=null && ci===opts.pmCol){
          const v = String(cell);
          color = v.startsWith('+') && v!=='+0' ? C.green : (v.startsWith('-') ? C.red : C.dim);
        }
        ctx.fillStyle = color;
        ctx.font = (ci===0 ? '600 13px Inter, sans-serif' : (ci===1?'700 13px "JetBrains Mono", monospace':'13px "JetBrains Mono", monospace'));
        const tx = ci===0 ? cx+12 : cx+widths[ci]/2;
        ctx.fillText(String(cell), tx, rowY + (rowH-13)/2 );
        cx += widths[ci];
      });
    });
    // テーブル外枠
    const bodyH = rows.length*rowH;
    ctx.strokeStyle = C.line;
    ctx.lineWidth = 1;
    ctx.strokeRect(x0, y-headH, tW, headH+bodyH);
    y += bodyH + gap;
    ctx.textAlign = 'left';
  }

  drawTable('チームスタッツ', teamHeader, teamRows, teamW, {});
  drawTable('自チーム個人スタッツ', playerHeader, ownRows, playerW, {effCol:16, pmCol:15});
  drawTable('相手チーム個人スタッツ（'+g.opponent+'）', playerHeader,
    oppRowsArr.length ? oppRowsArr : [['（記録なし）','','','','','','','','','','','','','','','','']],
    playerW, {effCol:16, pmCol:15});

  // ----- 保存 -----
  canvas.toBlob((blob)=>{
    if(!blob){ showToast('画像の生成に失敗しました'); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `boxscore_vs_${g.opponent}_${g.date||''}.png`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('画像を保存しました');
  }, 'image/png');
}

init().catch(err=>{
  document.getElementById('app').innerHTML =
    '<div class="card"><h2>エラーが発生しました</h2><div class="hint">'+escapeHtml(String(err))+'</div></div>';
  console.error(err);
});
