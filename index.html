<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>STATS APP — バスケスタッツトラッカー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f6f8;
  --panel:#ffffff;
  --panel-2:#eef0f4;
  --line:#d9dde4;
  --court:#f4f1e8;
  --orange:#ff6a1a;
  --orange-dim:#7a3d17;
  --green:#1f9d6b;
  --red:#e03149;
  --amber:#d98a00;
  --text:#1a1f27;
  --text-dim:#6b7280;
  --text-dim2:#9aa1ac;
  --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; overflow-x:hidden;}
.mono{font-family:'JetBrains Mono',monospace;}
.disp{font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.04em;}

/* header */
header{position:sticky; top:0; z-index:50; background:linear-gradient(180deg,#f5f6f8 80%,rgba(245,246,248,0));
  padding:14px 16px 6px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
.brand{display:flex; align-items:center; gap:10px;}
.brand .mark{flex:none; display:block; border-radius:7px; box-shadow:0 1px 3px rgba(26,31,39,.18);}
.brand h1{font-family:'Oswald',sans-serif; font-size:18px; margin:0; font-weight:600; letter-spacing:0.09em;}
.brand h1 span{color:var(--orange); margin-left:4px;}
.brand .ver{font-size:10px; color:var(--text-dim2); font-family:'JetBrains Mono'; align-self:flex-end; padding-bottom:2px;}
nav.tabs{display:flex; gap:6px; background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:4px;}
nav.tabs button{border:none; background:transparent; color:var(--text-dim); font-family:'Inter'; font-weight:600; font-size:12.5px;
  padding:8px 14px; border-radius:999px; cursor:pointer; transition:.15s;}
nav.tabs button.active{background:var(--orange); color:#1a0e05;}

main{max-width:920px; margin:0 auto; padding:8px 14px 90px;}
.card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px;}
.card h2{font-size:13px; margin:0 0 12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.08em; font-weight:700;}

/* buttons */
.btn{border:none; border-radius:10px; padding:12px 16px; font-weight:700; font-size:14px; cursor:pointer; font-family:'Inter'; transition:.12s; }
.btn:active{transform:scale(0.96);}
.btn-primary{background:var(--orange); color:#1a0e05;}
.btn-ghost{background:var(--panel-2); color:var(--text); border:1px solid var(--line);}
.btn-danger{background:transparent; color:var(--red); border:1px solid rgba(240,71,90,.4);}
.btn-block{width:100%;}
.btn-sm{padding:7px 10px; font-size:12px; border-radius:8px;}

/* roster */
.row{display:flex; gap:8px; margin-bottom:10px;}
input[type=text],input[type=number],input[type=date],select{
  background:var(--panel-2); border:1px solid var(--line); color:var(--text); border-radius:9px;
  padding:11px 12px; font-size:14px; font-family:'Inter'; width:100%; outline:none;}
input:focus,select:focus{border-color:var(--orange);}
.player-list{display:flex; flex-direction:column; gap:8px;}
.player-item{display:flex; align-items:center; gap:10px; background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:10px 12px;}
.num-badge{width:34px; height:34px; border-radius:8px; background:var(--bg); display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono'; font-weight:700; color:var(--amber); flex:none; font-size:14px;}
.player-item .pname{flex:1; font-weight:600; font-size:14.5px;}
.empty{color:var(--text-dim2); font-size:13px; text-align:center; padding:22px 10px;}

/* game list */
.game-item{display:flex; align-items:center; justify-content:space-between; background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:8px; cursor:pointer;}
.game-item:active{background:var(--bg);}
.game-item .gi-left .opp{font-weight:700; font-size:14.5px;}
.game-item .gi-left .date{color:var(--text-dim); font-size:12px; margin-top:2px;}
.badge{font-size:10.5px; font-weight:700; padding:4px 9px; border-radius:999px; letter-spacing:.04em;}
.badge.live{background:rgba(255,106,26,.15); color:var(--orange);}
.badge.done{background:rgba(139,147,163,.15); color:var(--text-dim);}

/* checkbox roster select */
.pick-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.pick-item{display:flex; align-items:center; gap:8px; background:var(--panel-2); border:1px solid var(--line); border-radius:9px; padding:9px 10px; cursor:pointer; user-select:none;}
.pick-item.on{border-color:var(--orange); background:rgba(255,106,26,.09);}
.pick-item input{accent-color:var(--orange);}

/* live game */
.gamebar{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.gamebar .info .gtitle{font-size:12px; color:var(--text-dim); font-weight:600; margin-bottom:2px;}
.gamebar .info .opp{font-family:'Oswald'; font-size:20px; font-weight:600; letter-spacing:.02em;}
.gamebar .info .date{color:var(--text-dim); font-size:12px;}

.stat-btn.big{padding:24px 8px; font-size:19px; font-weight:800;}
/* 左:自チーム / 中央:コート / 右:相手 の縦積みレイアウト
   画面幅に応じて選手ボタンの列幅を伸縮させ、余白を埋める */
.court-layout{display:grid; grid-template-columns:minmax(70px,130px) 1fr minmax(70px,130px); gap:10px; align-items:start; margin-top:6px;}
.team-col{display:flex; flex-direction:column; gap:8px;}
.team-col-label{font-size:11px; color:var(--text-dim2); font-weight:700; text-align:center; margin-bottom:2px;}
.court-center{min-width:0;}
.vchip{background:var(--panel-2); border:2px solid var(--line); border-radius:12px; padding:12px 4px 10px; text-align:center; cursor:pointer; transition:.12s; user-select:none; min-height:64px;}
.vchip:active{transform:scale(0.94);}
.vchip .num{font-family:'JetBrains Mono'; font-weight:700; font-size:32px; line-height:1.05;}
.vchip .nm{font-size:11px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:3px;}
.vchip .sub{font-size:11px; color:var(--amber); font-family:'JetBrains Mono'; margin-top:3px;}
.vchip .sub .pf{color:var(--red); font-weight:700;}
.vchip.oncourt{border-color:rgba(31,157,107,.6);}
.vchip.oncourt .num{color:var(--green);}
.vchip.selected{border-color:var(--orange); background:rgba(255,106,26,.12);}
.vchip.opp .num{color:var(--text);}
.vchip.opp.oncourt .num{color:var(--green);}
.vchip.opp.selected{border-color:var(--orange); background:rgba(255,106,26,.12);}
.vchip.opp.selected .num{color:var(--orange);}
/* シュートチャート */
.chart-chips{display:flex; gap:6px; flex-wrap:wrap;}
.chart-chip{border:1px solid var(--line); background:var(--panel-2); color:var(--text-dim); font-size:12px; font-weight:600;
  padding:7px 11px; border-radius:999px; cursor:pointer; font-family:'Inter';}
.chart-chip.on{background:var(--orange); color:#1a0e05; border-color:var(--orange);}
.chart-legend{display:flex; gap:20px; justify-content:center; margin-top:10px; font-size:12px; color:var(--text-dim);}
.chart-legend span{display:flex; align-items:center; gap:6px;}
.lg-made{width:12px; height:12px; border-radius:50%; border:2px solid var(--green); display:inline-block;}
.lg-miss{width:12px; height:12px; display:inline-block; position:relative;}
.lg-miss::before,.lg-miss::after{content:""; position:absolute; left:50%; top:0; width:2px; height:12px; background:var(--red);}
.lg-miss::before{transform:translateX(-50%) rotate(45deg);}
.lg-miss::after{transform:translateX(-50%) rotate(-45deg);}
.big-num{font-family:'JetBrains Mono'; font-size:28px; font-weight:700;}
/* プレイ修正タブ */
.log-row{display:flex; align-items:center; gap:10px; padding:12px 12px; border-bottom:1px solid var(--line); cursor:pointer; font-size:13px;}
.log-row:last-child{border-bottom:none;}
.log-row:active{background:var(--panel-2);}
.log-row .lg-time{font-family:'JetBrains Mono'; color:var(--text-dim); flex:none; width:74px; font-size:12px;}
.log-row .lg-name{flex:1; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.log-row .lg-name small{color:var(--text-dim); font-weight:400;}
.log-row .lg-label{flex:none; color:var(--text);}
.log-row .lg-score{font-family:'JetBrains Mono'; color:var(--text-dim); flex:none; width:70px; text-align:right; font-size:12px;}
.edit-field{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
.edit-field label{width:80px; flex:none; font-size:13px; font-weight:600; color:var(--text-dim);}
.edit-field select, .edit-field input{flex:1; min-width:0;}
/* メンバーチェンジ画面のカード */
.hrow{display:flex; gap:8px; overflow-x:auto; padding:4px 2px 8px; -webkit-overflow-scrolling:touch;}
.mcard{position:relative; flex:none; width:64px; background:var(--panel-2); border:2px solid var(--line); border-radius:12px;
  padding:10px 4px 8px; text-align:center; cursor:pointer; transition:.12s; user-select:none;}
.mcard:active{transform:scale(0.94);}
.mcard .num{font-family:'JetBrains Mono'; font-weight:700; font-size:22px; line-height:1.1;}
.mcard .nm{font-size:9px; color:var(--text-dim); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:3px;}
.mcard.on{background:var(--orange); border-color:var(--orange);}
.mcard.on .num{color:#1a0e05;}
.mcard.on .nm{color:rgba(26,14,5,.75);}
.mcard .xb{position:absolute; top:-7px; right:-7px; width:20px; height:20px; border-radius:50%; background:var(--red); color:#fff;
  font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; line-height:1;}
.mcard.editable{border-style:dashed; border-color:var(--amber);}
.selected-bar.oppbar{background:var(--panel-2); color:var(--text); border:1px solid var(--line);}
.court-wrap{display:flex; justify-content:center; padding:2px 0;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px rgba(55,201,143,.35);}50%{box-shadow:0 0 0 4px rgba(55,201,143,.12);}}
@keyframes pulse2{0%,100%{opacity:1;}50%{opacity:.3;}}

.scoreboard{display:flex; align-items:center; justify-content:space-between; background:var(--panel); border:1px solid var(--line);
  border-radius:var(--radius); padding:14px 18px; margin-bottom:10px;}
.scoreboard .sb-side{text-align:center; flex:1;}
.scoreboard .sb-label{font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-left:auto; margin-right:auto;}
.scoreboard .sb-score{font-family:'JetBrains Mono'; font-size:30px; font-weight:700;}
.scoreboard .sb-mid{font-family:'Oswald'; font-size:11px; color:var(--orange); font-weight:600; letter-spacing:.1em; padding:0 14px;}
.scoreboard .sb-foul{margin-top:5px; display:flex; align-items:center; justify-content:center; gap:3px; font-family:'JetBrains Mono'; font-size:10px; color:var(--text-dim);}
.scoreboard .sb-foul .fbox{width:14px; height:14px; border:1.5px solid var(--line); border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--text-dim2); position:relative;}
.scoreboard .sb-foul .fbox.x{border-color:var(--red); color:transparent;}
.scoreboard .sb-foul .fbox.x::before,.scoreboard .sb-foul .fbox.x::after{content:""; position:absolute; left:50%; top:50%; width:14px; height:1.5px; background:var(--red);}
.scoreboard .sb-foul .fbox.x::before{transform:translate(-50%,-50%) rotate(45deg);}
.scoreboard .sb-foul .fbox.x::after{transform:translate(-50%,-50%) rotate(-45deg);}
.scoreboard .sb-foul .bonus-tag{color:var(--red); font-weight:700; font-size:10px; margin-left:2px;}
.scoreboard .sb-to{margin-top:8px; display:flex; flex-direction:column; align-items:center; gap:4px;}
.scoreboard .sb-to .to-btn{border:1.5px solid var(--orange); background:var(--panel); color:var(--orange); border-radius:9px; font-size:13px; font-weight:700; padding:9px 14px; cursor:pointer; min-width:104px; min-height:40px; transition:.12s;}
.scoreboard .sb-to .to-btn:active{transform:scale(0.95); background:rgba(255,106,26,.1);}
.scoreboard .sb-to .to-btn:disabled{border-color:var(--line); color:var(--text-dim2); background:var(--panel-2); cursor:default;}
.scoreboard .sb-to .to-label{font-size:12px; font-weight:700; color:var(--text-dim);}
.scoreboard .sb-to .to-remain{font-family:'JetBrains Mono'; font-size:11px; color:var(--text-dim);}

.clockbar{display:flex; align-items:center; justify-content:space-between; background:var(--panel-2); border:1px solid var(--line);
  border-radius:var(--radius); padding:10px 14px; margin-bottom:14px; gap:10px;}
.clockbar .q-select{display:flex; align-items:center; gap:6px; flex:none;}
.clockbar .q-label{font-family:'Oswald'; font-size:14px; font-weight:600; min-width:36px; text-align:center;}
.clockbar .clock-display{font-family:'JetBrains Mono'; font-size:26px; font-weight:700; letter-spacing:.02em; flex:1; text-align:center;}

.selected-bar{position:sticky; top:56px; z-index:40; background:var(--orange); color:#1a0e05; border-radius:11px;
  padding:10px 14px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; font-weight:700;}
.selected-bar.none{background:var(--panel-2); color:var(--text-dim); border:1px dashed var(--line);}
.selected-bar .sname{font-family:'Oswald'; font-size:15px;}

.stat-section-title{font-size:11px; color:var(--text-dim2); text-transform:uppercase; letter-spacing:.08em; font-weight:700; margin:14px 0 8px;}
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.stat-grid.five{grid-template-columns:1fr 1fr 1fr;}
.stat-btn{border:none; border-radius:11px; padding:14px 8px; font-weight:700; font-size:13.5px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; transition:.1s;}
.stat-btn:active{transform:scale(0.94);}
.stat-btn.make{background:rgba(55,201,143,.14); color:var(--green); border:1.5px solid rgba(55,201,143,.4);}
.stat-btn.miss{background:rgba(240,71,90,.1); color:var(--red); border:1.5px solid rgba(240,71,90,.35);}
.stat-btn.neutral{background:var(--panel-2); color:var(--text); border:1.5px solid var(--line);}
.stat-btn small{font-weight:500; font-size:10px; opacity:.75; text-transform:uppercase;}
.stat-btn:disabled{opacity:.35; cursor:not-allowed;}

.util-row{display:flex; gap:8px; margin-top:14px;}
.toast{position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--panel-2); border:1px solid var(--orange);
  color:var(--text); padding:9px 16px; border-radius:999px; font-size:13px; font-weight:600; z-index:100; opacity:0; pointer-events:none; transition:.2s;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

/* box score */
.boxscore-wrap{overflow-x:auto; border-radius:var(--radius); border:1px solid var(--line);}
table{border-collapse:collapse; width:100%; min-width:760px; font-family:'JetBrains Mono'; font-size:12px;}
th,td{padding:8px 9px; text-align:center; white-space:nowrap;}
thead th{background:var(--panel-2); color:var(--text-dim); font-size:10.5px; text-transform:uppercase; letter-spacing:.03em; position:sticky; top:0;}
tbody tr{border-top:1px solid var(--line);}
tbody td:first-child, thead th:first-child{text-align:left; font-family:'Inter'; font-weight:600; font-size:12.5px;}
tbody tr:hover{background:rgba(0,0,0,.03);}
.pts-cell{color:var(--amber); font-weight:700;}

.footer-nav{position:fixed; bottom:14px; left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:60;}
.view-toggle{display:flex; gap:6px; background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:4px; margin-bottom:12px;}
.view-toggle button{border:none; background:transparent; color:var(--text-dim); font-weight:600; font-size:12.5px; padding:8px 14px; border-radius:999px; cursor:pointer;}
.view-toggle button.active{background:var(--panel-2); color:var(--orange);}

.fab-back{background:none; border:none; color:var(--text-dim); font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:4px; padding:6px 0; margin-bottom:6px;}
.hint{color:var(--text-dim2); font-size:12px; line-height:1.6; margin-top:4px;}
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg class="mark" width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="0" y="0" width="28" height="28" rx="7" fill="#1a1f27"/>
      <rect x="6"  y="15" width="3.6" height="7" rx="1.2" fill="#5b6472"/>
      <rect x="12.2" y="11" width="3.6" height="11" rx="1.2" fill="#9aa1ac"/>
      <rect x="18.4" y="6" width="3.6" height="16" rx="1.2" fill="#ff6a1a"/>
    </svg>
    <h1>STATS<span>APP</span></h1><span class="ver">v4.2</span>
  </div>
  <nav class="tabs" id="mainTabs"></nav>
</header>
<main id="app"></main>
<div class="toast" id="toast"></div>

<script>
/* ---------- storage helpers ---------- */
/* Claude.ai上のプレビューでは window.storage が使えるが、
   ダウンロードしたファイルをSafari単体で開いた場合は存在しないため、
   その場合は localStorage にフォールバックして動作・保存できるようにする */
const hasCloudStorage = (typeof window !== 'undefined' && !!window.storage && typeof window.storage.get === 'function');

async function loadKey(key, fallback){
  try{
    if(hasCloudStorage){
      const r = await window.storage.get(key, false);
      return r ? JSON.parse(r.value) : fallback;
    } else {
      const raw = localStorage.getItem('cs_'+key);
      return raw ? JSON.parse(raw) : fallback;
    }
  }catch(e){ return fallback; }
}
async function saveKey(key, value){
  try{
    if(hasCloudStorage){
      await window.storage.set(key, JSON.stringify(value), false);
    } else {
      localStorage.setItem('cs_'+key, JSON.stringify(value));
    }
  }catch(e){ console.error('save fail', key, e); }
}

/* ---------- state ---------- */
let state = {
  roster: [],       // メインチームのplayersへの参照（互換用）
  teams: [],        // {id, name, isMain, players:[]}
  games: [],         // game objects
  currentGameId: null,
  view: 'roster',    // 'roster' | 'games' | 'live'
  selectedSide: null, // 'own' | 'opp' | null
  selectedPlayerId: null,
  selectedOppPlayerId: null,
  pendingShot: null,
  liveTab: 'input', // 'input' | 'box' | 'chart'
  chartSide: 'own', // シュートチャートの表示チーム
  chartOwnId: null, // シュートチャートで絞り込む自チーム選手
  chartOppId: null,
  clockTick: null
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

/* 試合を切り替えるときに、前の試合の一時的なUI状態(選択中の選手・タップ途中のシュート・チャート絞り込み)をリセットする */
function resetGameUiState(){
  state.selectedSide = null;
  state.selectedPlayerId = null;
  state.selectedOppPlayerId = null;
  state.pendingShot = null;
  state.chartSide = 'own';
  state.chartOwnId = null;
  state.chartOppId = null;
}

function emptyStats(){
  return { twoM:0, twoA:0, threeM:0, threeA:0, ftM:0, ftA:0, oreb:0, dreb:0, ast:0, stl:0, blk:0, tov:0, pf:0, plusMinus:0,
    secondsPlayed:0, onCourt:false };
}
function emptyTeamStats(){
  return { twoM:0, twoA:0, threeM:0, threeA:0, ftM:0, ftA:0, oreb:0, dreb:0, ast:0, stl:0, blk:0, tov:0, pf:0, plusMinus:0, secondsPlayed:0 };
}
function ensureOppStats(g){
  if(!g.oppStats) g.oppStats = emptyTeamStats();
  return g.oppStats;
}
function ensureOppPlayers(g){
  if(!g.oppPlayers) g.oppPlayers = [];
  if(!g.oppPlayerStats) g.oppPlayerStats = {};
  // 旧バージョン(相手チーム個人記録が無い頃)のデータを「(以前の記録)」という1人にまとめて引き継ぐ
  if(!g._oppMigrated){
    const legacy = g.oppStats;
    if(legacy && Object.values(legacy).some(v=>v>0)){
      const legacyId = 'legacy_agg';
      if(!g.oppPlayerStats[legacyId]){
        g.oppPlayers.push({id:legacyId, number:'-', name:'(以前の記録)'});
        g.oppPlayerStats[legacyId] = Object.assign(emptyTeamStats(), legacy);
      }
    }
    g._oppMigrated = true;
  }
  return g.oppPlayers;
}
function sumOppStats(g){
  const total = emptyTeamStats();
  (g.oppPlayers||[]).forEach(p=>{
    const s = g.oppPlayerStats[p.id];
    if(!s) return;
    Object.keys(total).forEach(k=> total[k]+=s[k]||0);
  });
  return total;
}

/* ---------- ゲームクロック ---------- */
function ensureClock(g){
  if(!g.clock) g.clock = { quarter:1, seconds:g.quarterLengthSec||600, running:false };
  if(!g.quarterLengthSec) g.quarterLengthSec = 600;
  return g.clock;
}
function fmtClock(sec){
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec/60), s = sec%60;
  return m+':'+String(s).padStart(2,'0');
}
function setQuarter(g, q){
  const c = ensureClock(g);
  c.quarter = Math.max(1, q);
  c.seconds = g.quarterLengthSec||600;
  c.running = false;
  g.teamFoulsByQuarter = g.teamFoulsByQuarter||{};
  g.oppFoulsByQuarter = g.oppFoulsByQuarter||{};
}

/* クロックの残り時間を分・秒で手動編集するダイアログ */
function openClockEditDialog(g){
  const c = ensureClock(g);
  const wasRunning = c.running;
  c.running = false; // 編集中は止める
  const curMin = Math.floor(c.seconds/60);
  const curSec = c.seconds%60;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;';
  overlay.innerHTML = `
    <div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:320px;width:100%;">
      <h2 style="margin:0 0 12px; font-size:15px; font-weight:700;">残り時間を編集</h2>
      <div style="display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:16px;">
        <input type="number" id="ckMin" value="${curMin}" min="0" max="99" style="width:74px; text-align:center; font-family:'JetBrains Mono'; font-size:22px;">
        <span style="font-size:22px; font-weight:700;">:</span>
        <input type="number" id="ckSec" value="${curSec}" min="0" max="59" style="width:74px; text-align:center; font-family:'JetBrains Mono'; font-size:22px;">
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" id="ckCancel" style="flex:1;">キャンセル</button>
        <button class="btn btn-primary" id="ckSave" style="flex:1;">決定</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#ckCancel').onclick = async ()=>{
    c.running = wasRunning;
    overlay.remove();
    render();
  };
  overlay.querySelector('#ckSave').onclick = async ()=>{
    let m = parseInt(overlay.querySelector('#ckMin').value,10); if(isNaN(m)||m<0) m=0;
    let s = parseInt(overlay.querySelector('#ckSec').value,10); if(isNaN(s)||s<0) s=0; if(s>59) s=59;
    c.seconds = m*60 + s;
    c.running = false; // 編集後は停止状態から
    await persistGames();
    overlay.remove();
    render();
  };
}

/* ---------- ショット記録（コート上の位置） ---------- */
/* コート座標系: 12単位=1m。コート幅15m=180、ハーフ長14m=168。リング中心はベースラインから1.575m */
const HOOP = {x:100, y:29};
const THREE_RADIUS = 81; // 6.75m
function classifyShot(x,y){
  const dist = Math.sqrt((x-HOOP.x)**2 + (y-HOOP.y)**2);
  return dist > THREE_RADIUS;
}
/* ============================================================
   プレイ記録の中核: すべての記録/取消/修正はこの1つの関数を通す。
   entry: {playerId?|oppPlayerId?, key?|oppKey?, quarter, clockSec, shotId?}
   dir: +1=適用(記録) / -1=打ち消し(取消・修正時の巻き戻し)
   ============================================================ */
function applyLogEntry(g, e, dir){
  // タイムアウト
  if(e.timeout){
    g.timeouts = g.timeouts || {own:0, opp:0};
    g.timeouts[e.timeout] = Math.max(0, (g.timeouts[e.timeout]||0) + dir);
    return;
  }
  const isOpp = !!e.oppPlayerId || (!!e.oppKey && !e.playerId);
  const key = e.key || e.oppKey;
  if(!key) return;
  // 対象選手のスタッツ（削除済み選手はスキップ）
  let s = null;
  if(isOpp){
    if(e.oppPlayerId){ s = g.oppPlayerStats && g.oppPlayerStats[e.oppPlayerId]; }
    else { s = ensureOppStats(g); } // 旧バージョンのチーム単位記録
  } else {
    s = g.stats[e.playerId];
  }
  if(!s) return;

  const dec = (obj,k,n)=>{ obj[k] = Math.max(0, (obj[k]||0) + n); };

  if(key==='pf'){
    dec(s,'pf',dir);
    const q = e.quarter || 1;
    if(isOpp){
      g.oppFoulsByQuarter = g.oppFoulsByQuarter||{};
      g.oppFoulsByQuarter[q] = Math.max(0,(g.oppFoulsByQuarter[q]||0)+dir);
    } else {
      g.teamFoulsByQuarter = g.teamFoulsByQuarter||{};
      g.teamFoulsByQuarter[q] = Math.max(0,(g.teamFoulsByQuarter[q]||0)+dir);
    }
    return;
  }

  dec(s, key, dir);
  let score = 0;
  if(key==='twoM'){ dec(s,'twoA',dir); score = 2; }
  if(key==='threeM'){ dec(s,'threeA',dir); score = 3; }
  if(key==='ftM'){ dec(s,'ftA',dir); score = 1; }
  if(score){
    if(isOpp){
      g.opponentScore = Math.max(0,(g.opponentScore||0) + dir*score);
      applyPlusMinus(g, -dir*score);
    } else {
      applyPlusMinus(g, dir*score);
    }
  }
}

/* 現在のクロック情報を付与して記録エントリを作る */
function makeEntry(g, fields){
  const c = g.clock || {};
  return Object.assign({ id:uid(), quarter:c.quarter||1, clockSec:(typeof c.seconds==='number'?c.seconds:null), ts:Date.now() }, fields);
}

function recordShot(g, playerId, x, y, isThree, made){
  const key = isThree ? (made?'threeM':'threeA') : (made?'twoM':'twoA');
  const shotId = uid();
  g.shotLog = g.shotLog||[];
  g.shotLog.push({id:shotId, playerId, x, y, isThree, made, quarter:(g.clock&&g.clock.quarter)||1, ts:Date.now()});
  const e = makeEntry(g, {playerId, key, shotId});
  applyLogEntry(g, e, +1);
  g.log.push(e);
}
function recordShotOpp(g, oppPlayerId, x, y, isThree, made){
  const key = isThree ? (made?'threeM':'threeA') : (made?'twoM':'twoA');
  const shotId = uid();
  g.shotLog = g.shotLog||[];
  g.shotLog.push({id:shotId, oppPlayerId, x, y, isThree, made, team:'opp', quarter:(g.clock&&g.clock.quarter)||1, ts:Date.now()});
  const e = makeEntry(g, {oppPlayerId, oppKey:key, shotId});
  applyLogEntry(g, e, +1);
  g.log.push(e);
}

function pts(s){ return s.twoM*2 + s.threeM*3 + s.ftM*1; }
function effOf(s){
  const fgMissed = (s.twoA-s.twoM) + (s.threeA-s.threeM);
  const ftMissed = s.ftA - s.ftM;
  return pts(s) + s.oreb + s.dreb + s.ast + s.stl + s.blk - (fgMissed + ftMissed + (s.tov||0));
}
function applyPlusMinus(g, delta){
  // delta は自チーム視点（自チーム得点で+、相手得点で-）。相手選手には符号を反転して適用する。
  g.playerIds.forEach(pid=>{
    const s = g.stats[pid];
    if(s && s.onCourt) s.plusMinus = (s.plusMinus||0) + delta;
  });
  (g.oppPlayers||[]).forEach(p=>{
    const s = g.oppPlayerStats && g.oppPlayerStats[p.id];
    if(p.onCourt && s) s.plusMinus = (s.plusMinus||0) - delta;
  });
}
function pct(m,a){ return a>0 ? Math.round((m/a)*1000)/10 : 0; }
function fmtMin(sec){
  sec = Math.floor(sec);
  const m = Math.floor(sec/60), s = sec%60;
  return m+':'+String(s).padStart(2,'0');
}
function liveSeconds(s){
  return s.secondsPlayed||0; // ゲームクロックのtickでのみ加算される
}

function currentGame(){ return state.games.find(g=>g.id===state.currentGameId) || null; }

/* ---------- チーム管理 ----------
   state.teams = [{id, name, isMain, players:[{id,name,number}]}]
   state.roster は常にメインチームの players を指す（既存コードとの互換のため） */
function mainTeam(){
  return state.teams.find(t=>t.isMain) || state.teams[0] || null;
}
function syncRosterRef(){
  const mt = mainTeam();
  state.roster = mt ? mt.players : [];
}
/* 旧データ(roster単体)からの移行。teams未保存なら旧rosterをメインチームとして取り込む */
function migrateTeams(loadedTeams, loadedRoster){
  if(Array.isArray(loadedTeams) && loadedTeams.length){
    state.teams = loadedTeams;
  } else {
    state.teams = [{ id:uid(), name:'自チーム', isMain:true, players: Array.isArray(loadedRoster)?loadedRoster:[] }];
  }
  if(!state.teams.some(t=>t.isMain)) state.teams[0].isMain = true;
  syncRosterRef();
}

async function persistRoster(){ syncRosterRef(); await saveKey('teams', state.teams); }
async function persistTeams(){ syncRosterRef(); await saveKey('teams', state.teams); }
async function persistGames(){ await saveKey('games', state.games); }
async function persistCurrentGameId(){ await saveKey('currentGameId', state.currentGameId); }

  return new Promise(resolve=>{
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;';
    overlay.innerHTML = `
      <div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:320px;width:100%;">
        <div style="font-size:14px;line-height:1.6;margin-bottom:16px;">${escapeHtml(message)}</div>
        <div style="display:flex;gap:8px;">
          <button id="cfCancel" class="btn btn-ghost" style="flex:1;">キャンセル</button>
          <button id="cfOk" class="btn btn-primary" style="flex:1;">OK</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector('#cfCancel').onclick = ()=>{ overlay.remove(); resolve(false); };
    overlay.querySelector('#cfOk').onclick = ()=>{ overlay.remove(); resolve(true); };
  });
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(()=>t.classList.remove('show'), 1100);
}

/* ---------- init ---------- */
async function init(){
  const loadedTeams = await loadKey('teams', null);
  const loadedRoster = await loadKey('roster', []); // 旧バージョンのデータ
  migrateTeams(loadedTeams, loadedRoster);
  state.games = await loadKey('games', []);
  state.currentGameId = await loadKey('currentGameId', null);
  if(state.currentGameId && currentGame()){
    state.view = 'live';
    state.liveTab = currentGame().status === 'finished' ? 'box' : 'input';
  } else {
    state.view = state.roster.length ? 'games' : 'roster';
  }
  renderTabs();
  render();
  if(state.clockTick) clearInterval(state.clockTick);
  let tickCounter = 0;
  state.clockTick = setInterval(()=>{ tickGame(++tickCounter); }, 1000);
}

function renderTabs(){
  const tabs = document.getElementById('mainTabs');
  const defs = [['roster','チーム管理'],['games','試合']];
  tabs.innerHTML = '';
  defs.forEach(([key,label])=>{
    const b = document.createElement('button');
    b.textContent = label;
    b.className = (state.view===key || (key==='games' && state.view==='live')) ? 'active' : '';
    b.onclick = ()=>{ state.view = key; state.selectedPlayerId=null; render(); renderTabs(); };
    tabs.appendChild(b);
  });
}

/* ゲームクロックの1秒ごとの進行。実際に動いている間だけ出場時間を加算する */
function tickGame(tickCounter){
  const g = currentGame();
  if(!g || g.status!=='live') return;
  const c = ensureClock(g);
  let changed = false;
  let quarterEnded = false;
  if(c.running){
    if(c.seconds > 0){
      c.seconds -= 1;
      g.playerIds.forEach(pid=>{
        const s = g.stats[pid];
        if(s && s.onCourt) s.secondsPlayed = (s.secondsPlayed||0) + 1;
      });
      (g.oppPlayers||[]).forEach(p=>{
        const s = g.oppPlayerStats && g.oppPlayerStats[p.id];
        if(p.onCourt && s) s.secondsPlayed = (s.secondsPlayed||0) + 1;
      });
      changed = true;
      if(c.seconds === 0){
        c.running = false; // クォーター終了で自動停止
        quarterEnded = true;
        showToast('クォーター終了');
      }
    }
  }
  // クォーター終了時は取りこぼさないよう即保存。通常は5秒ごとに保存。
  if(quarterEnded || (changed && tickCounter % 5 === 0)) persistGames();
  if(state.view==='live') updateLiveDom(g);
}

/* lightweight refresh: フル再描画せずクロック・出場時間表示だけ更新（パフォーマンス対策） */
function updateLiveDom(g){
  document.querySelectorAll('[data-mins-for]').forEach(el=>{
    const pid = el.getAttribute('data-mins-for');
    const s = g.stats[pid];
    if(s) el.textContent = fmtMin(liveSeconds(s));
  });
  const clockEl = document.getElementById('gameClockDisplay');
  if(clockEl && g.clock) clockEl.textContent = fmtClock(g.clock.seconds);
  const startPauseBtn = document.getElementById('clockToggleBtn');
  if(startPauseBtn && g.clock) startPauseBtn.textContent = g.clock.running ? '⏸ 一時停止' : '▶ スタート';
}

/* ---------- render router ---------- */
function render(){
  const app = document.getElementById('app');
  if(state.view==='roster') app.innerHTML = '';
  if(state.view==='roster') return renderRosterView(app);
  if(state.view==='games') return renderGamesView(app);
  if(state.view==='live') return renderLiveView(app);
}

/* ---------- roster view ---------- */
function renderRosterView(app){
  // どのチームの選手を編集中か（未選択ならメインチーム）
  if(!state.editingTeamId || !state.teams.find(t=>t.id===state.editingTeamId)){
    const mt = mainTeam();
    state.editingTeamId = mt ? mt.id : null;
  }
  const team = state.teams.find(t=>t.id===state.editingTeamId);

  const teamListHtml = state.teams.map(t=>`
    <div class="player-item" style="${t.id===state.editingTeamId?'border-color:var(--orange);':''}">
      <div class="pname" data-team-open="${t.id}" style="cursor:pointer;">${escapeHtml(t.name)} ${t.isMain?'<span class="badge live" style="margin-left:6px;">メイン</span>':''}
        <small style="color:var(--text-dim);">（${t.players.length}人）</small></div>
      <button class="btn btn-ghost btn-sm" data-team-edit="${t.id}">編集</button>
      <button class="btn btn-danger btn-sm" data-team-del="${t.id}" ${t.isMain?'disabled':''}>削除</button>
    </div>`).join('');

  app.innerHTML = `
    <div class="card">
      <h2>チーム一覧</h2>
      <div class="player-list">${teamListHtml || '<div class="empty">チームがありません</div>'}</div>
      <div class="row" style="margin-top:12px;">
        <input type="text" id="newTeamName" placeholder="新しいチーム名">
        <button class="btn btn-primary btn-sm" id="addTeamBtn">チーム追加</button>
      </div>
      <div class="hint" style="margin-top:6px;">チーム名をタップすると、そのチームの選手を下で編集できます。「メイン」は自分のチームです。</div>
    </div>
    <div class="card">
      <h2>選手の登録: ${team?escapeHtml(team.name):'—'}（${team?team.players.length:0}人）</h2>
      <div class="row">
        <input type="number" id="newNum" placeholder="背番号" style="max-width:90px;">
        <input type="text" id="newName" placeholder="選手名">
        <button class="btn btn-primary btn-sm" id="addPlayerBtn">追加</button>
      </div>
      <div class="player-list" id="playerList" style="margin-top:10px;"></div>
    </div>
  `;

  // ---- チーム操作 ----
  document.getElementById('addTeamBtn').onclick = async ()=>{
    const nameEl = document.getElementById('newTeamName');
    const name = nameEl.value.trim();
    if(!name){ showToast('チーム名を入力してください'); return; }
    if(state.teams.some(t=>t.name===name)){ showToast('同じ名前のチームがあります'); return; }
    const t = {id:uid(), name, isMain:false, players:[]};
    state.teams.push(t);
    state.editingTeamId = t.id;
    await persistTeams();
    render();
  };
  app.querySelectorAll('[data-team-open]').forEach(el=>{
    el.onclick = ()=>{ state.editingTeamId = el.getAttribute('data-team-open'); render(); };
  });
  app.querySelectorAll('[data-team-edit]').forEach(btn=>{
    btn.onclick = ()=> openTeamEditDialog(btn.getAttribute('data-team-edit'));
  });
  app.querySelectorAll('[data-team-del]').forEach(btn=>{
    btn.onclick = async ()=>{
      const t = state.teams.find(x=>x.id===btn.getAttribute('data-team-del'));
      if(!t) return;
      if(t.isMain){ showToast('メインチームは削除できません'); return; }
      if(!(await askConfirm(`チーム「${t.name}」を削除しますか？（過去の試合記録は消えません）`))) return;
      state.teams = state.teams.filter(x=>x.id!==t.id);
      if(state.editingTeamId===t.id) state.editingTeamId = null;
      await persistTeams();
      render();
    };
  });

  // ---- 選手操作（選択中チーム） ----
  const list = document.getElementById('playerList');
  if(!team || team.players.length===0){
    list.innerHTML = '<div class="empty">まだ選手が登録されていません</div>';
  } else {
    team.players.slice().sort((a,b)=>(a.number+'').localeCompare(b.number+'',undefined,{numeric:true})).forEach(p=>{
      const row = document.createElement('div');
      row.className = 'player-item';
      row.innerHTML = `
        <div class="num-badge">${escapeHtml(String(p.number))}</div>
        <div class="pname">${escapeHtml(p.name||'')}</div>
        <button class="btn btn-danger btn-sm" data-del="${p.id}">削除</button>
      `;
      list.appendChild(row);
    });
  }
  document.getElementById('addPlayerBtn').onclick = async ()=>{
    if(!team){ showToast('先にチームを選択してください'); return; }
    const numEl = document.getElementById('newNum');
    const nameEl = document.getElementById('newName');
    const number = numEl.value.trim();
    const name = nameEl.value.trim();
    if(!number){ showToast('背番号を入力してください'); return; }
    if(!name && team.isMain){ showToast('選手名を入力してください'); return; }
    if(team.players.some(p=> String(p.number)===number)){
      showToast('背番号 '+number+' はすでに使われています'); return;
    }
    team.players.push({id:uid(), name, number});
    await persistTeams();
    numEl.value=''; nameEl.value='';
    render();
  };
  list.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = async ()=>{
      if(!(await askConfirm('この選手を削除しますか？'))) return;
      team.players = team.players.filter(p=>p.id!==btn.getAttribute('data-del'));
      await persistTeams();
      render();
    };
  });
}

/* チーム名の編集・メイン指定ダイアログ */
function openTeamEditDialog(teamId){
  const t = state.teams.find(x=>x.id===teamId);
  if(!t) return;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;';
  overlay.innerHTML = `
    <div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:340px;width:100%;">
      <h2 style="margin:0 0 12px; font-size:15px; font-weight:700;">チームを編集</h2>
      <div class="row"><input type="text" id="teName" value="${escapeHtml(t.name)}" placeholder="チーム名"></div>
      <label class="pick-item ${t.isMain?'on':''}" style="margin-bottom:12px;">
        <input type="checkbox" id="teMain" ${t.isMain?'checked':''} ${t.isMain?'disabled':''}>
        <span>メインチームにする（自分のチーム）</span>
      </label>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" id="teCancel" style="flex:1;">閉じる</button>
        <button class="btn btn-primary" id="teSave" style="flex:1;">保存</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#teCancel').onclick = ()=> overlay.remove();
  overlay.querySelector('#teSave').onclick = async ()=>{
    const name = overlay.querySelector('#teName').value.trim();
    if(!name){ showToast('チーム名を入力してください'); return; }
    if(state.teams.some(x=>x.id!==t.id && x.name===name)){ showToast('同じ名前のチームがあります'); return; }
    t.name = name;
    if(overlay.querySelector('#teMain').checked && !t.isMain){
      state.teams.forEach(x=> x.isMain = (x.id===t.id));
    }
    await persistTeams();
    overlay.remove();
    render();
  };
}

        state.currentGameId = g.id;
        await persistCurrentGameId();
        resetGameUiState();
        state.view='live'; state.liveTab = g.status==='finished' ? 'box' : 'input';
        renderTabs(); render();

      el.querySelector('[data-del-game]').onclick = async (ev)=>{

        if(!(await askConfirm(`「vs ${g.opponent}（${g.date||''}）」を削除しますか？この試合のスタッツ記録はすべて失われます。心配な場合は先に「データを書き出す」でバックアップを取ってください。`))) return;
        state.games = state.games.filter(x=>x.id!==g.id);
        if(state.currentGameId===g.id){
          state.currentGameId = null;
          await persistCurrentGameId();
        }
        await persistGames();
        showToast('試合を削除しました');
        render();
      };
      gl.appendChild(el);
    });
  }

  // データの書き出し・取り込み
  document.getElementById('exportDataBtn').onclick = ()=> openExportDialog();
  const fileInput = document.getElementById('importFileInput');
  document.getElementById('importDataBtn').onclick = ()=> fileInput.click();
  fileInput.onchange = ()=> importAllData(fileInput);
}

  const items = state.games.map(gm=>`
    <label class="pick-item on" data-exp-item>
      <input type="checkbox" value="${gm.id}" checked>

    </label>`).join('');

      <h2 style="margin:0 0 6px; font-size:15px; font-weight:700;">書き出す試合を選択</h2>

      <div class="util-row" style="margin-bottom:10px;">
        <button class="btn btn-ghost btn-sm" id="expAll" style="flex:1;">全選択</button>
        <button class="btn btn-ghost btn-sm" id="expNone" style="flex:1;">全解除</button>
      </div>
      <div class="pick-grid" style="grid-template-columns:1fr;">${items}</div>
      <div style="display:flex;gap:8px; margin-top:14px;">
        <button class="btn btn-ghost" id="expCancel" style="flex:1;">閉じる</button>
        <button class="btn btn-primary" id="expGo" style="flex:1;">書き出す</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const boxes = ()=> Array.from(overlay.querySelectorAll('input[type=checkbox]'));
  const syncStyles = ()=> overlay.querySelectorAll('[data-exp-item]').forEach(el=>{
    el.classList.toggle('on', el.querySelector('input').checked);
  });
  boxes().forEach(cb=>{ cb.onchange = syncStyles; });
  overlay.querySelector('#expAll').onclick = ()=>{ boxes().forEach(cb=>cb.checked=true); syncStyles(); };
  overlay.querySelector('#expNone').onclick = ()=>{ boxes().forEach(cb=>cb.checked=false); syncStyles(); };
  overlay.querySelector('#expCancel').onclick = ()=> overlay.remove();
  overlay.querySelector('#expGo').onclick = ()=>{

  };
}

function exportData(gameIds){
  const games = state.games.filter(gm=> gameIds.includes(gm.id));
  const data = {
    app: 'courtstats',
    version: 2,
    exportedAt: new Date().toISOString(),
    teams: state.teams,
    roster: state.roster, // 旧バージョンのアプリでも取り込めるよう残す
    games
  };
  const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  const stamp = d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  a.href = url; a.download = `statsapp_backup_${stamp}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`試合${games.length}件を書き出しました`);
}

async function importAllData(fileInput){
  const file = fileInput.files && fileInput.files[0];
  fileInput.value = ''; // 同じファイルを続けて選べるようにリセット
  if(!file) return;
  let data;
  try{
    const text = await file.text();
    data = JSON.parse(text);
  }catch(err){
    showToast('ファイルを読み込めませんでした');
    return;
  }
  if(!data || data.app!=='courtstats' || !Array.isArray(data.games) || (!Array.isArray(data.teams) && !Array.isArray(data.roster))){
    showToast('このアプリのバックアップファイルではありません');
    return;
  }
  const teamCount = Array.isArray(data.teams) ? data.teams.length : 1;
  const ok = await askConfirm(
    `取り込むデータ: チーム${teamCount}件 / 試合${data.games.length}件。`+
    `同じチーム・選手・試合（ID一致）はファイルの内容で上書きされ、それ以外は追加されます。よろしいですか？`);
  if(!ok) return;

  if(Array.isArray(data.teams) && data.teams.length){
    // 新形式: チームをidで突き合わせてマージ（選手はチーム内でidマージ）
    data.teams.forEach(dt=>{
      const t = state.teams.find(x=>x.id===dt.id);
      if(!t){
        // メインが重複しないように、取り込む側のisMainは既存メインが無い場合のみ有効
        const copy = Object.assign({}, dt);
        if(state.teams.some(x=>x.isMain)) copy.isMain = false;
        state.teams.push(copy);
      } else {
        t.name = dt.name;
        (dt.players||[]).forEach(dp=>{
          const i = t.players.findIndex(p=>p.id===dp.id);
          if(i>=0) t.players[i] = dp; else t.players.push(dp);
        });
      }
    });
  } else {
    // 旧形式(roster単体): メインチームの選手としてマージ
    const mt = mainTeam();
    (data.roster||[]).forEach(rp=>{
      const i = mt.players.findIndex(p=>p.id===rp.id);
      if(i>=0) mt.players[i] = rp; else mt.players.push(rp);
    });
  }
  // 試合: idで突き合わせて上書き or 追加（新しい順を維持）
  data.games.forEach(dg=>{
    const i = state.games.findIndex(x=>x.id===dg.id);
    if(i>=0) state.games[i] = dg; else state.games.unshift(dg);
  });
  state.games.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

  await persistTeams();
  await persistGames();
  showToast('データを取り込みました');
  render();
}

/* ---------- live game view ---------- */
function renderLiveView(app){
  const g = currentGame();
  if(!g){ state.view='games'; renderTabs(); return render(); }
  ensureClock(g);
  const teamScore = g.playerIds.reduce((sum,pid)=> sum + pts(g.stats[pid]), 0);
  const q = g.clock.quarter;
  const teamFoulsQ = (g.teamFoulsByQuarter && g.teamFoulsByQuarter[q]) || 0;
  const oppFoulsQ = (g.oppFoulsByQuarter && g.oppFoulsByQuarter[q]) || 0;

  const foulBoxes = (n)=>{
    let h = '';
    for(let i=1;i<=4;i++) h += `<span class="fbox ${n>=i?'x':''}">${i}</span>`;
    if(n>=5) h += '<span class="bonus-tag">ボーナス</span>';
    return h;
  };
  g.timeouts = g.timeouts || {own:0, opp:0};

  // 現在のクォーターがどの区分か（前半=1-2Q / 後半=3-4Q / OT=5Q以降）と、その区分の上限
  const curQ = (g.clock && g.clock.quarter) || 1;
  const period = curQ<=2 ? 'first' : (curQ<=4 ? 'second' : 'ot');
  const periodLabel = period==='first' ? '前半' : (period==='second' ? '後半' : 'OT');
  const periodMax = period==='first' ? 2 : (period==='second' ? 3 : 1);

  // ログからタイムアウトを区分別に集計 {own:{first,second,ot}, opp:{...}}
  const toUsed = { own:{first:0,second:0,ot:0}, opp:{first:0,second:0,ot:0} };
  (g.log||[]).forEach(e=>{
    if(!e.timeout) return;
    const pq = e.quarter||1;
    const slot = pq<=2 ? 'first' : (pq<=4 ? 'second' : 'ot');
    toUsed[e.timeout][slot]++;
  });
  const remainOwn = Math.max(0, periodMax - toUsed.own[period]);
  const remainOpp = Math.max(0, periodMax - toUsed.opp[period]);

  const toBlock = (side, remain)=>{
    if(g.status!=='live'){
      return `<div class="sb-to"><span class="to-label">タイムアウト</span><span class="to-remain">${periodLabel} 残り${remain}</span></div>`;
    }
    return `<div class="sb-to">
      <button class="to-btn" id="to${side==='own'?'Own':'Opp'}Btn" ${remain<=0?'disabled':''}>タイムアウト</button>
      <span class="to-remain">${periodLabel} 残り${remain} / ${periodMax}</span>
    </div>`;
  };

  app.innerHTML = `
    <button class="fab-back" id="backBtn">← 試合一覧へ</button>
    <div class="gamebar">
      <div class="info">
        ${g.title?`<div class="gtitle">${escapeHtml(g.title)}</div>`:''}
        <div class="opp">VS ${escapeHtml(g.opponent)}</div>
        <div class="date">${g.date||''}</div>
      </div>
      <div style="display:flex; gap:8px;">
        ${g.status==='live'
          ? '<button class="btn btn-ghost btn-sm" id="finishBtn">試合終了</button>'
          : '<button class="btn btn-primary btn-sm" id="reopenBtn">試合を再開する</button>'}
      </div>
    </div>
    <div class="scoreboard">
      <div class="sb-side"><div class="sb-label">${escapeHtml(g.teamName||'自チーム')}</div><div class="sb-score">${teamScore}</div>
        <div class="sb-foul">${foulBoxes(teamFoulsQ)}</div>
        ${toBlock('own', remainOwn)}</div>
      <div class="sb-mid">${g.status==='live' ? 'LIVE' : '終了'}</div>
      <div class="sb-side"><div class="sb-label">${escapeHtml(g.opponent)}</div><div class="sb-score">${g.opponentScore||0}</div>
        <div class="sb-foul">${foulBoxes(oppFoulsQ)}</div>
        ${toBlock('opp', remainOpp)}</div>
    </div>
    <div class="clockbar">
      <div class="q-select">
        <button class="btn btn-ghost btn-sm" id="qPrev" ${q<=1?'disabled':''}>‹</button>
        <span class="q-label">${q<=4? q+'Q' : 'OT'+(q-4)}</span>
        <button class="btn btn-ghost btn-sm" id="qNext">›</button>
      </div>
      <div class="clock-display" id="gameClockDisplay" style="cursor:${g.status==='live'?'pointer':'default'};" title="タップで時間を編集">${fmtClock(g.clock.seconds)}</div>
      <button class="btn ${g.clock.running?'btn-danger':'btn-primary'} btn-sm" id="clockToggleBtn" ${g.status==='live'?'':'disabled'}>${g.clock.running?'⏸ 一時停止':'▶ スタート'}</button>
    </div>
    <div class="view-toggle">
      <button id="vtCourt" class="${state.liveTab==='input'?'active':''}">スタッツ入力</button>
      <button id="vtBox" class="${state.liveTab==='box'?'active':''}">ボックススコア</button>
      <button id="vtChart" class="${state.liveTab==='chart'?'active':''}">シュートチャート</button>
      <button id="vtLog" class="${state.liveTab==='log'?'active':''}">プレイ修正</button>
    </div>
    <div id="liveBody"></div>
  `;
  document.getElementById('backBtn').onclick = ()=>{ state.view='games'; renderTabs(); render(); };
  document.getElementById('vtCourt').onclick = ()=>{ state.liveTab='input'; render(); };
  document.getElementById('vtBox').onclick = ()=>{ state.liveTab='box'; state.pendingShot=null; render(); };
  document.getElementById('vtChart').onclick = ()=>{ state.liveTab='chart'; state.pendingShot=null; render(); };
  document.getElementById('vtLog').onclick = ()=>{ state.liveTab='log'; state.pendingShot=null; render(); };
  document.getElementById('qPrev').onclick = async ()=>{
    if(g.clock.quarter<=1) return;
    if(g.clock.running || g.clock.seconds !== g.quarterLengthSec){
      if(!(await askConfirm('クォーターを移動すると、このクォーターの残り時間はリセットされます。よろしいですか？'))) return;
    }
    setQuarter(g, g.clock.quarter-1);
    await persistGames();
    render();
  };
  document.getElementById('qNext').onclick = async ()=>{
    if(g.clock.running || g.clock.seconds !== g.quarterLengthSec){
      if(!(await askConfirm('クォーターを移動すると、このクォーターの残り時間はリセットされます。よろしいですか？'))) return;
    }
    setQuarter(g, g.clock.quarter+1);
    await persistGames();
    render();
  };
  const clockBtn = document.getElementById('clockToggleBtn');
  if(clockBtn && g.status==='live'){
    clockBtn.onclick = async ()=>{
      g.clock.running = !g.clock.running;
      await persistGames();
      render();
    };
  }
  const clockDisp = document.getElementById('gameClockDisplay');
  if(clockDisp && g.status==='live'){
    clockDisp.onclick = ()=>{
      // 動作中の誤タップでクロックが止まるのを防ぐため、編集は一時停止中のみ
      if(g.clock.running){ showToast('時間を編集するには、先に一時停止してください'); return; }
      openClockEditDialog(g);
    };
  }
  // タイムアウト記録（クロックも止める）。区分ごとの上限を超えないようチェック
  const bindTimeout = (btnId, side)=>{
    const b = document.getElementById(btnId);
    if(!b) return;
    b.onclick = async ()=>{
      const remain = side==='own' ? remainOwn : remainOpp;
      if(remain<=0){ showToast(periodLabel+'のタイムアウトは残っていません'); return; }
      const e = makeEntry(g, {timeout:side});
      applyLogEntry(g, e, +1);
      g.log.push(e);
      g.clock.running = false;
      await persistGames();
      showToast((side==='own'?(g.teamName||'自チーム'):g.opponent)+`: タイムアウト（${periodLabel}残り${remain-1}）`);
      render();
    };
  };
  bindTimeout('toOwnBtn','own');
  bindTimeout('toOppBtn','opp');
  if(g.status==='live'){
    document.getElementById('finishBtn').onclick = async ()=>{
      if(!(await askConfirm('この試合を終了しますか？あとで「再開する」からいつでも編集を再開できます。'))) return;
      g.clock.running = false;
      g.playerIds.forEach(pid=>{ g.stats[pid].onCourt = false; });
      (g.oppPlayers||[]).forEach(p=>{ p.onCourt = false; });
      g.status='finished';
      await persistGames();
      state.liveTab = 'box';
      render();
    };
  } else {
    document.getElementById('reopenBtn').onclick = async ()=>{
      if(!(await askConfirm('この試合を再開して編集しますか？'))) return;
      g.status='live';
      await persistGames();
      state.liveTab = 'input';
      render();
    };
  }

  const body = document.getElementById('liveBody');
  if(state.liveTab==='box'){ renderBoxScore(body, g); }
  else if(state.liveTab==='chart'){ renderShotChart(body, g); }
  else if(state.liveTab==='log'){ renderPlayLog(body, g); }
  else { renderCourtInput(body, g); }
}

function renderCourtInput(body, g){
  ensureOppStats(g);
  ensureOppPlayers(g);
  ensureClock(g);
  const players = g.playerIds.map(pid=> state.roster.find(p=>p.id===pid) || {id:pid,name:'不明',number:'?'});
  players.sort((a,b)=> (a.number+'').localeCompare(b.number+'',undefined,{numeric:true}));
  const oppSorted = g.oppPlayers.slice().sort((a,b)=>(a.number+'').localeCompare(b.number+'',undefined,{numeric:true}));

  // 現在の選択（自チーム or 相手チームのどちらか一方のみ）
  const selP = state.selectedSide==='own' ? players.find(p=>p.id===state.selectedPlayerId) : null;
  const selOpp = state.selectedSide==='opp' ? oppSorted.find(p=>p.id===state.selectedOppPlayerId) : null;
  const canRecordOwn = !!selP && g.stats[selP.id].onCourt && g.status==='live';
  const canRecordOpp = !!selOpp && g.status==='live';
  const canRecord = canRecordOwn || canRecordOpp;

  const ownOnCourt = players.filter(p=> g.stats[p.id].onCourt);
  const oppOnCourt = oppSorted.filter(p=> p.onCourt);

  const ownChips = ownOnCourt.map(p=>{
    const s = g.stats[p.id];
    const isSel = selP && selP.id===p.id;
    const pf = s.pf||0;
    return `<div class="vchip oncourt ${isSel?'selected':''}" data-own-chip="${p.id}">
      <div class="num">${p.number}</div>
      <div class="nm">${escapeHtml(p.name)}</div>
      <div class="sub">${pts(s)}点${pf?` <span class="pf ${pf>=5?'out':pf>=4?'warn':''}">F${pf}</span>`:''}</div>
    </div>`;
  }).join('');

  const oppChips = oppOnCourt.map(p=>{
    const s = g.oppPlayerStats[p.id] || emptyTeamStats();
    const isSel = selOpp && selOpp.id===p.id;
    const pf = s.pf||0;
    return `<div class="vchip opp oncourt ${isSel?'selected':''}" data-opp-chip="${p.id}">
      <div class="num">${escapeHtml(String(p.number))}</div>
      <div class="nm">${escapeHtml(p.name||'')}</div>
      <div class="sub">${pts(s)}点${pf?` <span class="pf ${pf>=5?'out':pf>=4?'warn':''}">F${pf}</span>`:''}</div>
    </div>`;
  }).join('');

  // 選択バー
  let barHtml;
  if(selP){
    barHtml = `<div class="selected-bar"><span class="sname">#${selP.number} ${escapeHtml(selP.name)} を記録中</span><span>${pts(g.stats[selP.id])} 点</span></div>`;
  } else if(selOpp){
    const s = g.oppPlayerStats[selOpp.id] || emptyTeamStats();
    barHtml = `<div class="selected-bar oppbar"><span class="sname">相手 #${escapeHtml(String(selOpp.number))} ${escapeHtml(selOpp.name||'')} を記録中</span><span>${pts(s)} 点</span></div>`;
  } else {
    barHtml = `<div class="selected-bar none"><span>選手をタップして選択してください</span></div>`;
  }

  // シュート位置タップ後：成功/失敗ボタンのみ（案内バーなし、P表記）
  let pendingHtml = '';
  if(state.pendingShot){
    const label = state.pendingShot.isThree ? '3P' : '2P';
    pendingHtml = `
      <div class="stat-grid" style="margin-top:10px;">
        <button class="stat-btn make big" id="shotMake">${label} 成功</button>
        <button class="stat-btn miss big" id="shotMiss">${label} 失敗</button>
      </div>
      <div class="util-row" style="margin-top:8px;">
        <button class="btn btn-ghost btn-block btn-sm" id="shotCancel">位置を選び直す</button>
      </div>`;
  }

  body.innerHTML = `
    <div class="util-row" style="margin-bottom:10px;">
      <button class="btn btn-ghost" id="subModalBtn" style="flex:1;">🔄 メンバーチェンジ</button>
      <button class="btn btn-ghost" id="undoBtn" style="flex:1;" ${g.log.length===0?'disabled':''}>↩ 元に戻す</button>
    </div>
    ${barHtml}
    <div class="court-layout">
      <div class="team-col">
        <div class="team-col-label">自チーム</div>
        ${ownChips || '<div class="empty" style="font-size:10px; padding:6px;">メンバーチェンジで選手を入れてください</div>'}
      </div>
      <div class="court-center">
        <div class="court-wrap">${buildCourtSvg([], state.pendingShot)}</div>
        ${pendingHtml}
      </div>
      <div class="team-col">
        <div class="team-col-label">相手</div>
        ${oppChips || '<div class="empty" style="font-size:10px; padding:6px;">メンバーチェンジで相手を入れてください</div>'}
      </div>
    </div>
    <div class="stat-section-title">フリースロー</div>
    <div class="stat-grid">
      <button class="stat-btn make" data-anystat="ftM" ${canRecord?'':'disabled'}>フリースロー 成功 <small>+1点</small></button>
      <button class="stat-btn miss" data-anystat="ftA" ${canRecord?'':'disabled'}>フリースロー 失敗</button>
    </div>
    <div class="stat-section-title">リバウンド・その他</div>
    <div class="stat-grid five">
      <button class="stat-btn neutral" data-anystat="oreb" ${canRecord?'':'disabled'}>オフェンス<br>リバウンド</button>
      <button class="stat-btn neutral" data-anystat="dreb" ${canRecord?'':'disabled'}>ディフェンス<br>リバウンド</button>
      <button class="stat-btn neutral" data-anystat="ast" ${canRecord?'':'disabled'}>アシスト</button>
      <button class="stat-btn neutral" data-anystat="stl" ${canRecord?'':'disabled'}>スティール</button>
      <button class="stat-btn neutral" data-anystat="blk" ${canRecord?'':'disabled'}>ブロック</button>
      <button class="stat-btn miss" data-anystat="tov" ${canRecord?'':'disabled'}>ターン<br>オーバー</button>
      <button class="stat-btn miss" data-anystat="pf" ${canRecord?'':'disabled'}>ファウル</button>
    </div>
  `;

  document.getElementById('subModalBtn').onclick = ()=> openSubModal(g);

  // 選手チップ選択
  body.querySelectorAll('[data-own-chip]').forEach(chip=>{
    chip.onclick = ()=>{
      const pid = chip.getAttribute('data-own-chip');
      if(state.selectedSide==='own' && state.selectedPlayerId===pid){
        state.selectedSide=null; state.selectedPlayerId=null;
      } else {
        state.selectedSide='own'; state.selectedPlayerId=pid; state.selectedOppPlayerId=null;
      }
      render();
    };
  });
  body.querySelectorAll('[data-opp-chip]').forEach(chip=>{
    chip.onclick = ()=>{
      const pid = chip.getAttribute('data-opp-chip');
      if(state.selectedSide==='opp' && state.selectedOppPlayerId===pid){
        state.selectedSide=null; state.selectedOppPlayerId=null;
      } else {
        state.selectedSide='opp'; state.selectedOppPlayerId=pid; state.selectedPlayerId=null;
      }
      render();
    };
  });

  // コートをタップ → 位置から2点/3点を判定し、成功/失敗待ちに
  const svgEl = document.getElementById('courtSvg');
  if(svgEl){
    svgEl.style.cursor = 'crosshair';
    svgEl.addEventListener('click', (evt)=>{
      if(!canRecord){
        showToast(selP && !g.stats[selP.id].onCourt ? 'この選手はコート上にいません' : 'まず上の選手をタップして選択してください');
        return;
      }
      const rect = svgEl.getBoundingClientRect();
      const vb = svgEl.viewBox.baseVal;
      const relX = (evt.clientX - rect.left) / rect.width * vb.width + vb.x;
      const relY = (evt.clientY - rect.top) / rect.height * vb.height + vb.y;
      state.pendingShot = { x:Math.round(relX*10)/10, y:Math.round(relY*10)/10, isThree: classifyShot(relX,relY) };
      render();
    });
  }
  if(state.pendingShot){
    const finishShot = async (made)=>{
      const p = state.pendingShot;
      if(selP) recordShot(g, selP.id, p.x, p.y, p.isThree, made);
      else if(selOpp) recordShotOpp(g, selOpp.id, p.x, p.y, p.isThree, made);
      showToast((p.isThree?'3点':'2点')+(made?' 成功':' 失敗')+' 記録');
      state.pendingShot = null;
      await persistGames();
      render();
    };
    const mk = document.getElementById('shotMake'); if(mk) mk.onclick = ()=> finishShot(true);
    const ms = document.getElementById('shotMiss'); if(ms) ms.onclick = ()=> finishShot(false);
    const cn = document.getElementById('shotCancel'); if(cn) cn.onclick = ()=>{ state.pendingShot=null; render(); };
  }

  // FT・リバウンド等のボタン（自チーム/相手 共通）
  if(canRecord){
    body.querySelectorAll('[data-anystat]').forEach(btn=>{
      btn.onclick = async ()=>{
        const key = btn.getAttribute('data-anystat');
        // ファウルはフリースロー本数の選択を挟む（スコアシート出力に必要）
        if(key==='pf'){
          const ftAwarded = await askFtAwarded();
          if(ftAwarded===null) return; // キャンセル
          let e, toastMsg;
          if(selP){ e = makeEntry(g, {playerId:selP.id, key:'pf', ftAwarded}); toastMsg = 'ファウル 記録'; }
          else if(selOpp){ e = makeEntry(g, {oppPlayerId:selOpp.id, oppKey:'pf', ftAwarded}); toastMsg = '相手#'+selOpp.number+': ファウル 記録'; }
          else return;
          applyLogEntry(g, e, +1);
          g.log.push(e);
          if(selP){
            const s = g.stats[selP.id];
            if(s.pf>=5 && s.onCourt){ s.onCourt=false; toastMsg = '5ファウルのため退出しました'; }
          } else if(selOpp){
            const s = g.oppPlayerStats[selOpp.id];
            if(s.pf>=5 && selOpp.onCourt){ selOpp.onCourt=false; toastMsg = '相手#'+selOpp.number+': 5ファウルのため退出'; }
          }
          await persistGames();
          showToast(toastMsg);
          render();
          return;
        }
        let e, toastMsg;
        if(selP){
          e = makeEntry(g, {playerId:selP.id, key});
          toastMsg = statLabel(key)+' 記録';
        } else if(selOpp){
          e = makeEntry(g, {oppPlayerId:selOpp.id, oppKey:key});
          toastMsg = '相手#'+selOpp.number+': '+statLabel(key)+' 記録';
        } else return;
        applyLogEntry(g, e, +1);
        g.log.push(e);
        await persistGames();
        showToast(toastMsg);
        render();
      };
    });
  }

  // 元に戻す
  const undoBtn = document.getElementById('undoBtn');
  if(undoBtn && !undoBtn.disabled){
    undoBtn.onclick = async ()=>{
      const last = g.log.pop();
      if(!last) return;
      applyLogEntry(g, last, -1);
      if(last.shotId){ g.shotLog = (g.shotLog||[]).filter(sh=>sh.id!==last.shotId); }
      await persistGames();
      showToast('取り消しました');
      render();
    };
  }
}

/* ---------- コート図（ショットチャート） ---------- */
/* 3Pラインの座標をあらかじめ計算しておく（SVGのアークフラグの曖昧さを避けるため、点列で描画） */
function build3ptArcPoints(){
  const cx=HOOP.x, cy=HOOP.y, r=THREE_RADIUS;
  const baseY = 10; // ベースライン
  const dx = Math.sqrt(Math.max(0, r*r - (baseY-cy)*(baseY-cy)));
  const ax = cx-dx, bx = cx+dx; // ベースライン上の左右の端点
  const angleA0 = Math.atan2(baseY-cy, ax-cx);
  const angleB = Math.atan2(baseY-cy, bx-cx);
  const angleA = angleA0 < 0 ? angleA0 + Math.PI*2 : angleA0; // コート内（下側）を通るよう補正
  const steps = 48;
  const pts = [];
  for(let i=0;i<=steps;i++){
    const t = angleA + (angleB-angleA)*(i/steps);
    pts.push((cx+r*Math.cos(t)).toFixed(1)+','+(cy+r*Math.sin(t)).toFixed(1));
  }
  return pts.join(' ');
}
const THREE_ARC_POINTS = build3ptArcPoints();

function buildCourtSvg(shots, pending){
  let markers = '';
  (shots||[]).forEach(sh=>{
    const color = sh.made ? 'var(--green)' : 'var(--red)';
    if(sh.made){
      markers += `<circle cx="${sh.x}" cy="${sh.y}" r="4.5" fill="none" stroke="${color}" stroke-width="2"/>`;
    } else {
      const o=3.5;
      markers += `<line x1="${sh.x-o}" y1="${sh.y-o}" x2="${sh.x+o}" y2="${sh.y+o}" stroke="${color}" stroke-width="2"/>
                  <line x1="${sh.x-o}" y1="${sh.y+o}" x2="${sh.x+o}" y2="${sh.y-o}" stroke="${color}" stroke-width="2"/>`;
    }
  });
  let pendingMarker = '';
  if(pending){
    pendingMarker = `<circle cx="${pending.x}" cy="${pending.y}" r="7" fill="var(--orange)" opacity="0.85"><animate attributeName="opacity" values="0.85;0.35;0.85" dur="1.2s" repeatCount="indefinite"/></circle>`;
  }
  /* 12単位=1m。ペイント: 幅4.9m(70.6〜129.4)×長さ5.8m(y10〜79.6)。FTサークル r1.8m=21.6。
     3P: 半径6.75m=81(頂点y=110)でFTサークル下端(101.2)と重ならない */
  return `
  <svg id="courtSvg" viewBox="0 0 200 188" style="width:100%; max-width:600px; display:block; margin:0 auto; touch-action:manipulation; background:var(--panel-2); border-radius:8px;">
    <rect x="10" y="10" width="180" height="168" fill="none" stroke="var(--line)" stroke-width="2"/>
    <rect x="70.6" y="10" width="58.8" height="69.6" fill="none" stroke="var(--line)" stroke-width="1.5"/>
    <path d="M 78.4 79.6 A 21.6 21.6 0 0 0 121.6 79.6" fill="none" stroke="var(--line)" stroke-width="1.5"/>
    <line x1="89.2" y1="24.4" x2="110.8" y2="24.4" stroke="var(--line)" stroke-width="2.5"/>
    <circle cx="100" cy="29" r="2.7" fill="none" stroke="var(--orange)" stroke-width="2"/>
    <polyline points="${THREE_ARC_POINTS}" fill="none" stroke="var(--line)" stroke-width="2"/>
    ${markers}
    ${pendingMarker}
    <rect id="courtTapTarget" x="10" y="10" width="180" height="168" fill="transparent" style="cursor:pointer;"/>
  </svg>`;
}

/* ---------- メンバーチェンジ画面 ---------- */
function openSubModal(g){
  ensureOppPlayers(g);
  // メンバーチェンジ中はクロックを止める
  if(g.clock && g.clock.running){ g.clock.running = false; persistGames(); }
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:flex-start;justify-content:center;overflow:auto;padding:16px;';
  document.body.appendChild(overlay);

  let editMode = false;

  function ownPlayers(){
    const ps = g.playerIds.map(pid=> state.roster.find(p=>p.id===pid) || {id:pid,name:'不明',number:'?'});
    ps.sort((a,b)=> (a.number+'').localeCompare(b.number+'',undefined,{numeric:true}));
    return ps;
  }
  function oppPlayersSorted(){
    return g.oppPlayers.slice().sort((a,b)=>(a.number+'').localeCompare(b.number+'',undefined,{numeric:true}));
  }

  function cardHtml(p, opts){
    // opts: {side:'own'|'opp', onCourtRow:boolean}
    const attr = `data-side="${opts.side}" data-pid="${p.id}" data-row="${opts.onCourtRow?'court':'all'}"`;
    if(opts.onCourtRow){
      return `<div class="mcard on" ${attr}><span class="xb">×</span><div class="num">${escapeHtml(String(p.number))}</div><div class="nm">${escapeHtml(p.name||'')}</div></div>`;
    }
    return `<div class="mcard ${editMode?'editable':''}" ${attr}><div class="num">${escapeHtml(String(p.number))}</div><div class="nm">${escapeHtml(p.name||'')}</div></div>`;
  }

  function renderModal(){
    const own = ownPlayers();
    const ownCourt = own.filter(p=> g.stats[p.id].onCourt);
    const opp = oppPlayersSorted();
    const oppCourt = opp.filter(p=> p.onCourt);
    overlay.innerHTML = `
      <div style="background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;max-width:640px;width:100%;margin:auto 0;">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
          <h2 style="margin:0; font-size:16px; font-weight:700;">メンバーチェンジ</h2>
          <button class="btn ${editMode?'btn-primary':'btn-ghost'} btn-sm" id="editModeBtn">${editMode?'編集モード中':'✎ 編集'}</button>
        </div>
        <div class="hint" style="margin-bottom:10px;">${editMode
          ? '編集モード: 上段の選手をタップすると番号・名前の変更や削除ができます'
          : '上段（全メンバー）をタップでコートIN、下段（コート上）の選手をタップでOUT'}</div>

        <div style="display:flex; align-items:center; justify-content:space-between;">
          <div class="stat-section-title" style="margin:8px 0 6px;">自チーム</div>
          <button class="btn btn-ghost btn-sm" data-add="own">＋ メンバー追加</button>
        </div>
        <div class="hrow">${own.length? own.map(p=>cardHtml(p,{side:'own',onCourtRow:false})).join('') : '<div class="empty" style="padding:6px;">選手がいません</div>'}</div>
        <div class="hint" style="margin:6px 0 2px;">コート上（${ownCourt.length}/5）</div>
        <div class="hrow court">${ownCourt.length? ownCourt.map(p=>cardHtml(p,{side:'own',onCourtRow:true})).join('') : '<div class="empty" style="padding:6px;">コート上に選手がいません</div>'}</div>

        <div style="display:flex; align-items:center; justify-content:space-between; margin-top:14px;">
          <div class="stat-section-title" style="margin:8px 0 6px;">相手チーム（${escapeHtml(g.opponent)}）</div>
          <button class="btn btn-ghost btn-sm" data-add="opp">＋ メンバー追加</button>
        </div>
        <div class="hrow">${opp.length? opp.map(p=>cardHtml(p,{side:'opp',onCourtRow:false})).join('') : '<div class="empty" style="padding:6px;">未登録</div>'}</div>
        <div class="hint" style="margin:6px 0 2px;">コート上（${oppCourt.length}/5）</div>
        <div class="hrow court">${oppCourt.length? oppCourt.map(p=>cardHtml(p,{side:'opp',onCourtRow:true})).join('') : '<div class="empty" style="padding:6px;">コート上に選手がいません</div>'}</div>

        <button class="btn btn-primary btn-block" id="subDone" style="margin-top:16px;">完了</button>
      </div>`;

    overlay.querySelector('#subDone').onclick = async ()=>{ await persistGames(); overlay.remove(); render(); };
    overlay.querySelector('#editModeBtn').onclick = ()=>{ editMode = !editMode; renderModal(); };
    overlay.querySelectorAll('[data-add]').forEach(btn=>{
      btn.onclick = ()=> openMemberAddDialog(g, btn.getAttribute('data-add'), renderModal);
    });

    overlay.querySelectorAll('.mcard').forEach(card=>{
      card.onclick = async ()=>{
        const side = card.getAttribute('data-side');
        const pid = card.getAttribute('data-pid');
        const row = card.getAttribute('data-row');
        if(row==='all' && editMode){
          openMemberEditDialog(g, side, pid, renderModal);
          return;
        }
        if(side==='own'){
          const s = g.stats[pid];
          if(row==='all'){
            if(s.onCourt){ showToast('すでにコート上です'); return; }
            const cnt = g.playerIds.filter(id=>g.stats[id].onCourt).length;
            if(cnt>=5){ showToast('コート上は5人までです。先に誰かをOUTしてください'); return; }
            if((s.pf||0)>=5){ showToast('5ファウルの選手は出場できません'); return; }
            s.onCourt = true;
          } else {
            s.onCourt = false;
            if(state.selectedPlayerId===pid){ state.selectedPlayerId=null; state.selectedSide=null; }
          }
        } else {
          const p = g.oppPlayers.find(x=>x.id===pid);
          if(!p) return;
          if(row==='all'){
            if(p.onCourt){ showToast('すでにコート上です'); return; }
            const cnt = g.oppPlayers.filter(x=>x.onCourt).length;
            if(cnt>=5){ showToast('コート上は5人までです。先に誰かをOUTしてください'); return; }
            p.onCourt = true;
          } else {
            p.onCourt = false;
            if(state.selectedOppPlayerId===pid){ state.selectedOppPlayerId=null; state.selectedSide=null; }
          }
        }
        await persistGames();
        renderModal();
      };
    });
  }
  renderModal();
}

/* ---------- メンバー追加ダイアログ ---------- */
function openMemberAddDialog(g, side, onDone){
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;';
  let rosterOptions = '';
  if(side==='own'){
    const notInGame = state.roster.filter(p=> !g.playerIds.includes(p.id));
    if(notInGame.length){
      rosterOptions = `<div class="hint" style="margin:8px 0 6px;">登録済みの選手から追加:</div>
        <div class="pick-grid">${notInGame.map(p=>`<label class="pick-item" data-roster-add="${p.id}"><span>#${escapeHtml(String(p.number))} ${escapeHtml(p.name)}</span></label>`).join('')}</div>
        <div class="hint" style="margin:10px 0 6px;">または新しい選手を作成:</div>`;
    }
  }
  overlay.innerHTML = `
    <div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:380px;width:100%;max-height:80vh;overflow:auto;">
      <h2 style="margin:0 0 12px; font-size:15px; font-weight:700;">${side==='own'?'自チーム':'相手チーム'}にメンバー追加</h2>
      ${rosterOptions}
      <div class="row">
        <input type="number" id="mNum" placeholder="背番号" style="max-width:90px;">
        <input type="text" id="mName" placeholder="名前${side==='opp'?'（任意）':''}">
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost" id="mCancel" style="flex:1;">閉じる</button>
        <button class="btn btn-primary" id="mAdd" style="flex:1;">追加する</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#mCancel').onclick = ()=> overlay.remove();
  overlay.querySelectorAll('[data-roster-add]').forEach(el=>{
    el.onclick = async ()=>{
      const pid = el.getAttribute('data-roster-add');
      g.playerIds.push(pid);
      g.stats[pid] = emptyStats();
      await persistGames();
      overlay.remove();
      onDone();
    };
  });
  overlay.querySelector('#mAdd').onclick = async ()=>{
    const number = overlay.querySelector('#mNum').value.trim();
    const name = overlay.querySelector('#mName').value.trim();
    if(!number){ showToast('背番号を入力してください'); return; }
    if(side==='own'){
      if(!name){ showToast('選手名を入力してください'); return; }
      if(state.roster.some(p=> String(p.number)===number)){ showToast('背番号 '+number+' はすでに使われています'); return; }
      const id = uid();
      state.roster.push({id, name, number});
      g.playerIds.push(id);
      g.stats[id] = emptyStats();
      await persistRoster(); await persistGames();
    } else {
      if(g.oppPlayers.some(p=> String(p.number)===number)){ showToast('背番号 '+number+' はすでに使われています'); return; }
      const id = uid();
      g.oppPlayers.push({id, number, name});
      g.oppPlayerStats[id] = emptyTeamStats();
      await persistGames();
    }
    overlay.remove();
    onDone();
  };
}

/* ---------- メンバー編集・削除ダイアログ ---------- */
function openMemberEditDialog(g, side, pid, onDone){

  const overlay = document.createElement('div');

  overlay.innerHTML = `
    <div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;max-width:340px;width:100%;">
      <h2 style="margin:0 0 12px; font-size:15px; font-weight:700;">選手を編集</h2>

      <div style="display:flex;gap:8px; margin-bottom:8px;">
